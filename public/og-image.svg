<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0a0a0c"/>
  
  <!-- Ambient glow -->
  <circle cx="600" cy="280" r="200" fill="#d4952e" opacity="0.03" filter="url(#blur)"/>
  
  <!-- Logo: dark square with amber diamond -->
  <rect x="556" y="186" width="88" height="88" rx="12" fill="#1d1d1f" stroke="#d4952e" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="583.75" y="213.75" width="32.5" height="32.5" rx="4" transform="rotate(45 600 230)" fill="#d4952e"/>
  
  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" fill="#f5f5f7" font-family="Georgia, serif" font-size="52" font-weight="300" letter-spacing="-1">Le Sanctum</text>
  
  <!-- Tagline -->
  <text x="600" y="385" text-anchor="middle" fill="#a1a1a6" font-family="Georgia, serif" font-size="20" font-style="italic" font-weight="300">Your haus, wittily managed.</text>
  
  <!-- Bottom line -->
  <line x1="400" y1="440" x2="800" y2="440" stroke="#d4952e" stroke-opacity="0.15" stroke-width="1"/>
  
  <!-- URL -->
  <text x="600" y="480" text-anchor="middle" fill="#424245" font-family="monospace" font-size="14" letter-spacing="2">SANCTUM.RUN</text>
  
  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>
</svg>
