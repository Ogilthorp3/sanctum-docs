name: install.sh hash

# Regenerates public/install.sh.sha256 whenever install.sh changes,
# so the served hash always matches the served script. Beta testers
# who run the trust-but-verify path get a fresh hash on every push,
# never a stale one.

on:
  push:
    branches: [main]
    paths:
      - "public/install.sh"
      - ".github/workflows/install-sh-hash.yml"
  pull_request:
    paths:
      - "public/install.sh"
      - ".github/workflows/install-sh-hash.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA-256
        id: hash
        run: |
          cd public
          shasum -a 256 install.sh > install.sh.sha256
          echo "computed: $(cat install.sh.sha256)"

      - name: Verify roundtrip locally
        run: |
          cd public
          shasum -a 256 -c install.sh.sha256

      - name: Commit if changed
        run: |
          if git diff --quiet public/install.sh.sha256; then
            echo "hash file already current — nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/install.sh.sha256
          git commit -m "chore(install.sh): regenerate sha256 [skip ci]"
          # Only push on push events to main, not on PRs (PRs can't push back to base).
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            git push origin HEAD:main
          else
            echo "Skipping push (PR or non-main context)"
          fi
