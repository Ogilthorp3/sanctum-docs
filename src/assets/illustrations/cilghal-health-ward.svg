<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="cBg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0a0d0c"/>
      <stop offset="50%" stop-color="#0d100f"/>
      <stop offset="100%" stop-color="#080a09"/>
    </linearGradient>
    <radialGradient id="cGlow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#1a5c3a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="cBlur"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="1200" height="400" fill="url(#cBg)"/>
  <rect width="1200" height="400" fill="url(#cGlow)"/>
  <!-- DNA helix -->
  <g opacity="0.3" stroke="#2aaa6a" stroke-width="1.5" fill="none">
    <path d="M200,80 Q300,200 400,80 Q500,200 600,80 Q700,200 800,80 Q900,200 1000,80"/>
    <path d="M200,120 Q300,0 400,120 Q500,0 600,120 Q700,0 800,120 Q900,0 1000,120"/>
    <line x1="250" y1="90" x2="250" y2="110" opacity="0.5"/>
    <line x1="350" y1="90" x2="350" y2="110" opacity="0.5"/>
    <line x1="450" y1="90" x2="450" y2="110" opacity="0.5"/>
    <line x1="550" y1="90" x2="550" y2="110" opacity="0.5"/>
    <line x1="650" y1="90" x2="650" y2="110" opacity="0.5"/>
    <line x1="750" y1="90" x2="750" y2="110" opacity="0.5"/>
    <line x1="850" y1="90" x2="850" y2="110" opacity="0.5"/>
    <line x1="950" y1="90" x2="950" y2="110" opacity="0.5"/>
  </g>
  <!-- Health monitors -->
  <g opacity="0.2">
    <rect x="100" y="180" width="200" height="120" rx="8" fill="none" stroke="#2aaa6a" stroke-width="1"/>
    <polyline points="110,250 130,240 150,260 170,220 190,250 210,230 230,250 250,240 270,250 290,245" fill="none" stroke="#2aaa6a" stroke-width="1.5" opacity="0.6"/>
    <rect x="500" y="200" width="200" height="100" rx="8" fill="none" stroke="#d4952e" stroke-width="1"/>
    <text x="600" y="245" text-anchor="middle" fill="#d4952e" font-family="monospace" font-size="11" opacity="0.5">GENOMIC PANEL</text>
    <text x="600" y="265" text-anchor="middle" fill="#2aaa6a" font-family="monospace" font-size="9" opacity="0.4">10 panels • 847 SNPs</text>
    <rect x="900" y="190" width="200" height="110" rx="8" fill="none" stroke="#2aaa6a" stroke-width="1"/>
    <text x="1000" y="240" text-anchor="middle" fill="#2aaa6a" font-family="monospace" font-size="11" opacity="0.5">MEMORY SENTINEL</text>
    <text x="1000" y="260" text-anchor="middle" fill="#d4952e" font-family="monospace" font-size="9" opacity="0.4">escalation_level: 3</text>
  </g>
  <!-- Warm healing particles -->
  <circle cx="300" cy="350" r="2" fill="#2aaa6a" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="600" cy="370" r="1.5" fill="#d4952e" opacity="0.3"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" begin="1s" repeatCount="indefinite"/></circle>
  <circle cx="900" cy="340" r="2" fill="#2aaa6a" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="5s" begin="2s" repeatCount="indefinite"/></circle>
</svg>
