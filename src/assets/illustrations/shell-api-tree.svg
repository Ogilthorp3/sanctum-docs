<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <!-- Amber glow -->
    <radialGradient id="amberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d4952e" stop-opacity="0"/>
    </radialGradient>
    <!-- Branch gradient -->
    <linearGradient id="branchGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4952e"/>
      <stop offset="100%" stop-color="#4a7a9b"/>
    </linearGradient>
    <!-- Leaf glow -->
    <radialGradient id="leafGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a7a9b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4a7a9b" stop-opacity="0"/>
    </radialGradient>
    <!-- Terminal glow -->
    <radialGradient id="termGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#d4952e" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="#0a0a0c"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#4a7a9b" stroke-width="0.5">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Terminal glow background -->
  <ellipse cx="160" cy="200" rx="180" ry="180" fill="url(#termGlow)"/>

  <!-- Terminal box -->
  <rect x="60" y="130" width="200" height="140" rx="8" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1.5"/>
  <!-- Terminal title bar -->
  <rect x="60" y="130" width="200" height="24" rx="8" fill="#2a2a3e"/>
  <circle cx="78" cy="142" r="4" fill="#d4952e" opacity="0.7"/>
  <circle cx="92" cy="142" r="4" fill="#4a7a9b" opacity="0.5"/>
  <circle cx="106" cy="142" r="4" fill="#2a2a3e" stroke="#4a7a9b" stroke-width="0.5" opacity="0.5"/>

  <!-- Terminal prompt $ -->
  <text x="80" y="185" font-family="monospace" font-size="32" font-weight="bold" fill="#d4952e">$</text>
  <!-- Cursor blink -->
  <rect x="110" y="168" width="12" height="22" fill="#d4952e" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.1;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Terminal lines -->
  <rect x="80" y="205" width="120" height="3" rx="1" fill="#4a7a9b" opacity="0.3"/>
  <rect x="80" y="220" width="90" height="3" rx="1" fill="#4a7a9b" opacity="0.2"/>
  <rect x="80" y="235" width="140" height="3" rx="1" fill="#4a7a9b" opacity="0.15"/>

  <!-- Trunk line from terminal -->
  <line x1="260" y1="200" x2="380" y2="200" stroke="url(#branchGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Branch 1: top — 3 leaves -->
  <path d="M380,200 Q420,200 450,120" stroke="url(#branchGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M450,120 Q465,95 520,80" stroke="url(#branchGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M450,120 Q470,110 540,115" stroke="url(#branchGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M450,120 Q460,130 530,150" stroke="url(#branchGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Leaf nodes branch 1 -->
  <circle cx="520" cy="80" r="16" fill="url(#leafGlow)"/>
  <circle cx="520" cy="80" r="6" fill="#4a7a9b" opacity="0.9"/>
  <circle cx="540" cy="115" r="14" fill="url(#leafGlow)"/>
  <circle cx="540" cy="115" r="5" fill="#4a7a9b" opacity="0.8"/>
  <circle cx="530" cy="150" r="14" fill="url(#leafGlow)"/>
  <circle cx="530" cy="150" r="5" fill="#4a7a9b" opacity="0.8"/>

  <!-- Branch 2: middle-upper — 2 leaves -->
  <path d="M380,200 Q430,195 500,185" stroke="url(#branchGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M500,185 Q540,175 610,165" stroke="url(#branchGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M500,185 Q550,190 630,200" stroke="url(#branchGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Leaf nodes branch 2 -->
  <circle cx="610" cy="165" r="16" fill="url(#leafGlow)"/>
  <circle cx="610" cy="165" r="6" fill="#4a7a9b" opacity="0.9"/>
  <circle cx="630" cy="200" r="14" fill="url(#leafGlow)"/>
  <circle cx="630" cy="200" r="5" fill="#4a7a9b" opacity="0.8"/>

  <!-- Branch 3: middle-lower — 3 leaves -->
  <path d="M380,200 Q430,210 480,240" stroke="url(#branchGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M480,240 Q510,250 580,245" stroke="url(#branchGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M480,240 Q520,260 600,280" stroke="url(#branchGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M480,240 Q500,270 550,300" stroke="url(#branchGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Leaf nodes branch 3 -->
  <circle cx="580" cy="245" r="14" fill="url(#leafGlow)"/>
  <circle cx="580" cy="245" r="5" fill="#4a7a9b" opacity="0.8"/>
  <circle cx="600" cy="280" r="16" fill="url(#leafGlow)"/>
  <circle cx="600" cy="280" r="6" fill="#4a7a9b" opacity="0.9"/>
  <circle cx="550" cy="300" r="14" fill="url(#leafGlow)"/>
  <circle cx="550" cy="300" r="5" fill="#4a7a9b" opacity="0.8"/>

  <!-- Branch 4: bottom — 2 leaves -->
  <path d="M380,200 Q410,230 440,310" stroke="url(#branchGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M440,310 Q460,330 530,340" stroke="url(#branchGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M440,310 Q450,340 490,360" stroke="url(#branchGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Leaf nodes branch 4 -->
  <circle cx="530" cy="340" r="14" fill="url(#leafGlow)"/>
  <circle cx="530" cy="340" r="5" fill="#4a7a9b" opacity="0.8"/>
  <circle cx="490" cy="360" r="16" fill="url(#leafGlow)"/>
  <circle cx="490" cy="360" r="6" fill="#4a7a9b" opacity="0.9"/>

  <!-- Extended fine branches to the right for depth -->
  <path d="M610,165 Q660,155 720,140" stroke="#4a7a9b" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round"/>
  <circle cx="720" cy="140" r="3" fill="#4a7a9b" opacity="0.3"/>
  <path d="M630,200 Q690,195 750,190" stroke="#4a7a9b" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round"/>
  <circle cx="750" cy="190" r="3" fill="#4a7a9b" opacity="0.3"/>
  <path d="M600,280 Q660,285 730,270" stroke="#4a7a9b" stroke-width="1" fill="none" opacity="0.25" stroke-linecap="round"/>
  <circle cx="730" cy="270" r="3" fill="#4a7a9b" opacity="0.25"/>

  <!-- Ambient particles -->
  <circle cx="800" cy="100" r="1.5" fill="#d4952e" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="250" r="1" fill="#4a7a9b" opacity="0.25"/>
  <circle cx="850" cy="320" r="1.5" fill="#d4952e" opacity="0.2"/>
  <circle cx="950" cy="150" r="1" fill="#4a7a9b" opacity="0.2"/>
  <circle cx="1050" cy="200" r="1.5" fill="#d4952e" opacity="0.15"/>
  <circle cx="1100" cy="310" r="1" fill="#4a7a9b" opacity="0.2"/>
  <circle cx="770" cy="60" r="1" fill="#4a7a9b" opacity="0.15"/>
  <circle cx="1000" cy="350" r="1.5" fill="#d4952e" opacity="0.15"/>

  <!-- Pulse on the trunk junction -->
  <circle cx="380" cy="200" r="6" fill="#d4952e" opacity="0.6">
    <animate attributeName="r" values="4;10;4" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.15;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="200" r="4" fill="#d4952e" opacity="0.9"/>
</svg>