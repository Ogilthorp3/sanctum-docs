<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <!-- Amber glow for left platform -->
    <radialGradient id="amberPlat" cx="20%" cy="50%" r="25%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#d4952e" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
    <!-- Blue glow for right platform -->
    <radialGradient id="bluePlat" cx="80%" cy="50%" r="25%">
      <stop offset="0%" stop-color="#4a7a9b" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#4a7a9b" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
    <!-- Bridge gradient -->
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4952e"/>
      <stop offset="50%" stop-color="#7a8a5e"/>
      <stop offset="100%" stop-color="#4a7a9b"/>
    </linearGradient>
    <!-- Data packet amber trail -->
    <linearGradient id="pktAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d4952e" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Data packet blue trail -->
    <linearGradient id="pktBlue" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4a7a9b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4a7a9b" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="400" fill="#0a0a0c"/>

  <!-- Platform glows -->
  <rect width="1200" height="400" fill="url(#amberPlat)"/>
  <rect width="1200" height="400" fill="url(#bluePlat)"/>

  <!-- Void stars below bridge -->
  <g opacity="0.5">
    <circle cx="320" cy="310" r="1" fill="#fff" opacity="0.3"/>
    <circle cx="450" cy="340" r="0.8" fill="#fff" opacity="0.2"/>
    <circle cx="520" cy="360" r="1.2" fill="#fff" opacity="0.25"/>
    <circle cx="600" cy="330" r="0.8" fill="#fff" opacity="0.35"/>
    <circle cx="680" cy="355" r="1" fill="#fff" opacity="0.2"/>
    <circle cx="750" cy="320" r="0.8" fill="#fff" opacity="0.3"/>
    <circle cx="830" cy="345" r="1.2" fill="#fff" opacity="0.15"/>
    <circle cx="900" cy="370" r="0.8" fill="#fff" opacity="0.25"/>
    <circle cx="400" cy="375" r="0.6" fill="#fff" opacity="0.2"/>
    <circle cx="550" cy="385" r="1" fill="#fff" opacity="0.15"/>
    <circle cx="700" cy="380" r="0.7" fill="#fff" opacity="0.2"/>
    <circle cx="480" cy="295" r="0.5" fill="#4a7a9b" opacity="0.3"/>
    <circle cx="620" cy="305" r="0.6" fill="#d4952e" opacity="0.2"/>
    <circle cx="770" cy="298" r="0.5" fill="#4a7a9b" opacity="0.25"/>
  </g>

  <!-- Left platform (Mac) -->
  <path d="M40,235 L300,235 L320,255 L20,255 Z" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
  <path d="M40,235 L300,235 L320,255 L20,255 Z" fill="#d4952e" opacity="0.04"/>
  <!-- Mac silhouette (monitor) -->
  <rect x="115" y="130" width="100" height="75" rx="4" fill="#1a1a2e" stroke="#d4952e" stroke-width="1" opacity="0.7"/>
  <rect x="120" y="135" width="90" height="60" rx="2" fill="#d4952e" opacity="0.06"/>
  <!-- Monitor stand -->
  <rect x="153" y="205" width="24" height="20" fill="#1a1a2e"/>
  <rect x="140" y="222" width="50" height="4" rx="2" fill="#1a1a2e"/>
  <!-- Screen content lines -->
  <rect x="130" y="150" width="50" height="2" fill="#d4952e" opacity="0.4"/>
  <rect x="130" y="158" width="65" height="2" fill="#d4952e" opacity="0.3"/>
  <rect x="130" y="166" width="35" height="2" fill="#d4952e" opacity="0.25"/>
  <rect x="130" y="174" width="55" height="2" fill="#d4952e" opacity="0.2"/>
  <!-- Status light -->
  <circle cx="140" cy="190" r="2" fill="#d4952e" opacity="0.6"/>

  <!-- Right platform (VM) -->
  <path d="M900,235 L1160,235 L1180,255 L880,255 Z" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
  <path d="M900,235 L1160,235 L1180,255 L880,255 Z" fill="#4a7a9b" opacity="0.04"/>
  <!-- VM server rack -->
  <rect x="980" y="120" width="70" height="105" rx="3" fill="#1a1a2e" stroke="#4a7a9b" stroke-width="1" opacity="0.7"/>
  <!-- Server slots -->
  <rect x="987" y="128" width="56" height="15" rx="1" fill="#0a0a0c" stroke="#4a7a9b" stroke-width="0.5" opacity="0.4"/>
  <rect x="987" y="148" width="56" height="15" rx="1" fill="#0a0a0c" stroke="#4a7a9b" stroke-width="0.5" opacity="0.4"/>
  <rect x="987" y="168" width="56" height="15" rx="1" fill="#0a0a0c" stroke="#4a7a9b" stroke-width="0.5" opacity="0.4"/>
  <rect x="987" y="188" width="56" height="15" rx="1" fill="#0a0a0c" stroke="#4a7a9b" stroke-width="0.5" opacity="0.3"/>
  <rect x="987" y="208" width="56" height="15" rx="1" fill="#0a0a0c" stroke="#4a7a9b" stroke-width="0.5" opacity="0.25"/>
  <!-- Status lights -->
  <circle cx="995" cy="135" r="2" fill="#4a7a9b" opacity="0.7"/>
  <circle cx="995" cy="155" r="2" fill="#4a7a9b" opacity="0.5"/>
  <circle cx="995" cy="175" r="2" fill="#4a7a9b" opacity="0.6"/>
  <circle cx="995" cy="195" r="2" fill="#4a7a9b" opacity="0.35"/>
  <circle cx="995" cy="215" r="2" fill="#4a7a9b" opacity="0.25"/>

  <!-- Bridge structure -->
  <!-- Catenary cable -->
  <path d="M310,235 Q600,185 890,235" stroke="url(#bridgeGrad)" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Bridge deck -->
  <line x1="300" y1="240" x2="900" y2="240" stroke="url(#bridgeGrad)" stroke-width="3"/>
  <line x1="300" y1="248" x2="900" y2="248" stroke="url(#bridgeGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- TypeScript angle bracket supports -->
  <!-- Left < -->
  <g fill="none" stroke="#d4952e" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <path d="M400,215 L375,244 L400,273"/>
  </g>
  <!-- Center <> pair (larger) -->
  <g fill="none" stroke="url(#bridgeGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.85">
    <path d="M560,205 L530,244 L560,283"/>
    <path d="M640,205 L670,244 L640,283"/>
  </g>
  <!-- Right > -->
  <g fill="none" stroke="#4a7a9b" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <path d="M800,215 L825,244 L800,273"/>
  </g>

  <!-- Suspension cables from catenary to deck -->
  <line x1="375" y1="227" x2="375" y2="240" stroke="#d4952e" stroke-width="0.5" opacity="0.3"/>
  <line x1="530" y1="210" x2="530" y2="240" stroke="url(#bridgeGrad)" stroke-width="0.5" opacity="0.3"/>
  <line x1="600" y1="205" x2="600" y2="240" stroke="url(#bridgeGrad)" stroke-width="0.5" opacity="0.3"/>
  <line x1="670" y1="210" x2="670" y2="240" stroke="url(#bridgeGrad)" stroke-width="0.5" opacity="0.3"/>
  <line x1="825" y1="227" x2="825" y2="240" stroke="#4a7a9b" stroke-width="0.5" opacity="0.3"/>

  <!-- Data packets: amber going right -->
  <rect x="0" y="237" width="14" height="5" rx="1" fill="url(#pktAmber)">
    <animate attributeName="x" values="310;890" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- Data packets: blue going left -->
  <rect x="0" y="242" width="10" height="4" rx="1" fill="url(#pktBlue)">
    <animate attributeName="x" values="890;310" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="5s" repeatCount="indefinite"/>
  </rect>
  <!-- Third packet: amber, slower -->
  <rect x="0" y="239" width="8" height="4" rx="1" fill="#d4952e" opacity="0.5">
    <animate attributeName="x" values="310;890" dur="6.5s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" dur="6.5s" begin="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Reflection in void -->
  <g opacity="0.06">
    <line x1="310" y1="265" x2="890" y2="265" stroke="url(#bridgeGrad)" stroke-width="2"/>
    <line x1="330" y1="275" x2="870" y2="275" stroke="url(#bridgeGrad)" stroke-width="1"/>
  </g>

  <!-- Floating ambient particles -->
  <circle cx="250" cy="100" r="1" fill="#d4952e" opacity="0.3"/>
  <circle cx="950" cy="100" r="1" fill="#4a7a9b" opacity="0.3"/>
  <circle cx="600" cy="140" r="1" fill="#fff" opacity="0.15"/>
  <circle cx="200" cy="350" r="1" fill="#d4952e" opacity="0.15"/>
  <circle cx="1050" cy="320" r="1" fill="#4a7a9b" opacity="0.15"/>
</svg>