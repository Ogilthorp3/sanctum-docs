<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <!-- Amber glow for magnifying glass lens -->
    <radialGradient id="lensGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#d4952e" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d4952e" stop-opacity="0"/>
    </radialGradient>
    <!-- Light beam gradient -->
    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4952e" stop-opacity="0"/>
    </linearGradient>
    <!-- Highlight doc gradient -->
    <linearGradient id="docHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#d4952e" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Dim doc gradient -->
    <linearGradient id="docDim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a3e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Ambient glow behind lens area -->
    <radialGradient id="ambientGlow" cx="45%" cy="45%" r="30%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="400" fill="#0a0a0c"/>

  <!-- Ambient glow behind scanner -->
  <rect width="1200" height="400" fill="url(#ambientGlow)"/>

  <!-- Document field: rows of abstract rectangles -->
  <!-- Row 1 (y ~120) -->
  <rect x="180" y="115" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="185" y="130" width="40" height="2" fill="#4a7a9b" opacity="0.15"/>
  <rect x="185" y="137" width="55" height="2" fill="#4a7a9b" opacity="0.1"/>
  <rect x="185" y="144" width="30" height="2" fill="#4a7a9b" opacity="0.08"/>

  <rect x="280" y="115" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="285" y="130" width="50" height="2" fill="#4a7a9b" opacity="0.15"/>
  <rect x="285" y="137" width="35" height="2" fill="#4a7a9b" opacity="0.1"/>

  <rect x="380" y="115" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="385" y="130" width="45" height="2" fill="#4a7a9b" opacity="0.15"/>
  <rect x="385" y="137" width="60" height="2" fill="#4a7a9b" opacity="0.1"/>

  <rect x="480" y="115" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="485" y="130" width="50" height="2" fill="#4a7a9b" opacity="0.15"/>

  <rect x="580" y="115" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="680" y="115" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="780" y="115" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="880" y="115" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="980" y="115" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>

  <!-- Row 2 (y ~185) — under the magnifying glass, some highlighted -->
  <rect x="180" y="180" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="280" y="180" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>

  <!-- Highlighted documents (amber glow — found by scanner) -->
  <rect x="380" y="180" width="80" height="50" rx="3" fill="url(#docHighlight)" stroke="#d4952e" stroke-width="1" opacity="0.9"/>
  <rect x="385" y="192" width="45" height="2" fill="#d4952e" opacity="0.7"/>
  <rect x="385" y="199" width="60" height="2" fill="#d4952e" opacity="0.5"/>
  <rect x="385" y="206" width="30" height="2" fill="#d4952e" opacity="0.4"/>

  <rect x="480" y="180" width="80" height="50" rx="3" fill="url(#docHighlight)" stroke="#d4952e" stroke-width="1" opacity="0.8"/>
  <rect x="485" y="192" width="55" height="2" fill="#d4952e" opacity="0.6"/>
  <rect x="485" y="199" width="40" height="2" fill="#d4952e" opacity="0.4"/>

  <rect x="580" y="180" width="80" height="50" rx="3" fill="url(#docHighlight)" stroke="#d4952e" stroke-width="1" opacity="0.7"/>
  <rect x="585" y="192" width="50" height="2" fill="#d4952e" opacity="0.5"/>
  <rect x="585" y="199" width="35" height="2" fill="#d4952e" opacity="0.3"/>

  <rect x="680" y="180" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="780" y="180" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="880" y="180" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="980" y="180" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>

  <!-- Row 3 (y ~250) -->
  <rect x="180" y="245" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="280" y="245" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="380" y="245" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="480" y="245" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="580" y="245" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="680" y="245" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="780" y="245" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="880" y="245" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="980" y="245" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>

  <!-- Row 4 (y ~310) -->
  <rect x="180" y="310" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="280" y="310" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="380" y="310" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="480" y="310" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="580" y="310" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="680" y="310" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="780" y="310" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="880" y="310" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>
  <rect x="980" y="310" width="80" height="50" rx="3" fill="url(#docDim)" stroke="#2a2a3e" stroke-width="0.5"/>

  <!-- Light beams from magnifying glass lens downward onto highlighted docs -->
  <polygon points="480,140 380,180 460,180" fill="url(#beamGrad)" opacity="0.3"/>
  <polygon points="500,140 480,180 560,180" fill="url(#beamGrad)" opacity="0.25"/>
  <polygon points="520,140 580,180 660,180" fill="url(#beamGrad)" opacity="0.2"/>
  <polygon points="490,130 420,180 440,180" fill="url(#beamGrad)" opacity="0.15"/>

  <!-- Magnifying glass -->
  <!-- Lens glow (large, atmospheric) -->
  <circle cx="500" cy="105" r="100" fill="url(#lensGlow)"/>
  <!-- Lens circle -->
  <circle cx="500" cy="105" r="65" fill="none" stroke="#d4952e" stroke-width="3" opacity="0.7"/>
  <!-- Inner lens highlight -->
  <circle cx="500" cy="105" r="60" fill="#d4952e" opacity="0.04"/>
  <!-- Lens reflection arc -->
  <path d="M465,60 Q500,50 535,60" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
  <!-- Lens crosshair (subtle) -->
  <line x1="500" y1="75" x2="500" y2="135" stroke="#d4952e" stroke-width="0.5" opacity="0.2"/>
  <line x1="470" y1="105" x2="530" y2="105" stroke="#d4952e" stroke-width="0.5" opacity="0.2"/>

  <!-- Magnifying glass handle -->
  <line x1="548" y1="152" x2="600" y2="204" stroke="#4a7a9b" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="548" y1="152" x2="600" y2="204" stroke="#d4952e" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Robot silhouette holding the magnifying glass -->
  <g transform="translate(580,180)">
    <!-- Robot body -->
    <rect x="10" y="30" width="40" height="50" rx="6" fill="#1a1a2e" stroke="#4a7a9b" stroke-width="1.2" opacity="0.8"/>
    <!-- Robot head -->
    <rect x="15" y="8" width="30" height="25" rx="4" fill="#1a1a2e" stroke="#4a7a9b" stroke-width="1.2" opacity="0.8"/>
    <!-- Robot eyes -->
    <circle cx="25" cy="20" r="3" fill="#d4952e" opacity="0.7"/>
    <circle cx="35" cy="20" r="3" fill="#d4952e" opacity="0.7"/>
    <!-- Robot antenna -->
    <line x1="30" y1="8" x2="30" y2="-2" stroke="#4a7a9b" stroke-width="1" opacity="0.6"/>
    <circle cx="30" cy="-4" r="2" fill="#4a7a9b" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Robot arm reaching to handle -->
    <path d="M10,45 Q-5,35 -10,20" fill="none" stroke="#4a7a9b" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <!-- Robot legs (simple) -->
    <line x1="22" y1="80" x2="18" y2="100" stroke="#4a7a9b" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="38" y1="80" x2="42" y2="100" stroke="#4a7a9b" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <!-- Chest light -->
    <rect x="24" y="42" width="12" height="8" rx="2" fill="#4a7a9b" opacity="0.3"/>
    <rect x="26" y="44" width="8" height="4" rx="1" fill="#4a7a9b" opacity="0.15"/>
  </g>

  <!-- Scanning sweep animation: a faint vertical line sweeping across documents -->
  <line x1="0" y1="100" x2="0" y2="370" stroke="#d4952e" stroke-width="1" opacity="0.3">
    <animate attributeName="x1" values="180;1060;180" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="180;1060;180" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="8s" repeatCount="indefinite"/>
  </line>

  <!-- Small sparkles near highlighted documents -->
  <circle cx="420" cy="185" r="2" fill="#d4952e" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="525" cy="178" r="1.5" fill="#d4952e" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="635" cy="182" r="1.5" fill="#d4952e" opacity="0.3"/>

  <!-- Edge particles -->
  <circle cx="100" cy="200" r="1" fill="#4a7a9b" opacity="0.2"/>
  <circle cx="1120" cy="180" r="1" fill="#4a7a9b" opacity="0.15"/>
  <circle cx="1100" cy="320" r="1" fill="#d4952e" opacity="0.1"/>
  <circle cx="120" cy="340" r="1" fill="#d4952e" opacity="0.1"/>
</svg>