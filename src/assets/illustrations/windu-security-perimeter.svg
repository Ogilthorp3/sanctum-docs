<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <radialGradient id="windu-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a0a2e" stop-opacity="1"/>
      <stop offset="60%" stop-color="#0d0518" stop-opacity="1"/>
      <stop offset="100%" stop-color="#06020d" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="windu-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9040ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#9040ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="windu-glow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="windu-blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <linearGradient id="windu-tower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0f2a"/>
      <stop offset="100%" stop-color="#0a0515"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#windu-bg)"/>

  <!-- Distant network topology lines -->
  <g opacity="0.15" stroke="#9040ff" stroke-width="0.5">
    <line x1="100" y1="350" x2="300" y2="300"/>
    <line x1="300" y1="300" x2="500" y2="320"/>
    <line x1="500" y1="320" x2="700" y2="290"/>
    <line x1="700" y1="290" x2="900" y2="310"/>
    <line x1="900" y1="310" x2="1100" y2="350"/>
    <line x1="300" y1="300" x2="350" y2="250"/>
    <line x1="700" y1="290" x2="650" y2="240"/>
    <line x1="500" y1="320" x2="600" y2="260"/>
    <line x1="900" y1="310" x2="850" y2="260"/>
  </g>

  <!-- Network nodes -->
  <g opacity="0.3">
    <circle cx="300" cy="300" r="4" fill="#9040ff" opacity="0.5"/>
    <circle cx="500" cy="320" r="3" fill="#9040ff" opacity="0.4"/>
    <circle cx="700" cy="290" r="5" fill="#9040ff" opacity="0.6"/>
    <circle cx="900" cy="310" r="3" fill="#9040ff" opacity="0.4"/>
    <circle cx="350" cy="250" r="2" fill="#ff4060" opacity="0.8"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="240" r="2" fill="#4aff6a" opacity="0.5"/>
    <circle cx="600" cy="260" r="2" fill="#4aff6a" opacity="0.4"/>
    <circle cx="850" cy="260" r="2" fill="#ff4060" opacity="0.6"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Left watchtower -->
  <g>
    <rect x="80" y="50" width="60" height="350" fill="url(#windu-tower)" opacity="0.7"/>
    <rect x="75" y="40" width="70" height="15" fill="#1a0f2a" stroke="#2a1540" stroke-width="0.5"/>
    <!-- Battlements -->
    <rect x="75" y="30" width="15" height="15" fill="#1a0f2a"/>
    <rect x="100" y="30" width="15" height="15" fill="#1a0f2a"/>
    <rect x="125" y="30" width="15" height="15" fill="#1a0f2a"/>
    <!-- Tower windows -->
    <rect x="95" y="70" width="30" height="20" rx="2" fill="#0d0518" stroke="#9040ff" stroke-width="0.5" opacity="0.5"/>
    <rect x="95" y="110" width="30" height="20" rx="2" fill="#0d0518" stroke="#9040ff" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Right watchtower -->
  <g>
    <rect x="1060" y="50" width="60" height="350" fill="url(#windu-tower)" opacity="0.7"/>
    <rect x="1055" y="40" width="70" height="15" fill="#1a0f2a" stroke="#2a1540" stroke-width="0.5"/>
    <rect x="1055" y="30" width="15" height="15" fill="#1a0f2a"/>
    <rect x="1080" y="30" width="15" height="15" fill="#1a0f2a"/>
    <rect x="1105" y="30" width="15" height="15" fill="#1a0f2a"/>
    <rect x="1075" y="70" width="30" height="20" rx="2" fill="#0d0518" stroke="#9040ff" stroke-width="0.5" opacity="0.5"/>
    <rect x="1075" y="110" width="30" height="20" rx="2" fill="#0d0518" stroke="#9040ff" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Central elevated platform / parapet -->
  <rect x="300" y="160" width="600" height="8" fill="#1a0f2a" stroke="#2a1540" stroke-width="0.5"/>
  <rect x="350" y="155" width="10" height="10" fill="#1a0f2a"/>
  <rect x="450" y="155" width="10" height="10" fill="#1a0f2a"/>
  <rect x="550" y="155" width="10" height="10" fill="#1a0f2a"/>
  <rect x="650" y="155" width="10" height="10" fill="#1a0f2a"/>
  <rect x="750" y="155" width="10" height="10" fill="#1a0f2a"/>
  <rect x="840" y="155" width="10" height="10" fill="#1a0f2a"/>

  <!-- Sentinel figure (center, overlooking) -->
  <g transform="translate(600, 130)">
    <!-- Purple aura -->
    <ellipse cx="0" cy="0" rx="40" ry="50" fill="url(#windu-purple)" opacity="0.5"/>
    <!-- Cloak/body -->
    <path d="M-18,25 Q-22,0 -15,-20 Q-10,-30 0,-35 Q10,-30 15,-20 Q22,0 18,25 L10,25 Q5,5 0,25 Q-5,5 -10,25 Z" fill="#120820" stroke="#2a1540" stroke-width="0.5"/>
    <!-- Head -->
    <circle cx="0" cy="-42" r="10" fill="#120820" stroke="#2a1540" stroke-width="0.5"/>
    <!-- Purple saber glow -->
    <line x1="20" y1="10" x2="45" y2="-5" stroke="#9040ff" stroke-width="2" opacity="0.6" filter="url(#windu-glow)"/>
    <line x1="20" y1="10" x2="45" y2="-5" stroke="#c880ff" stroke-width="1" opacity="0.8"/>
  </g>

  <!-- Threat monitoring screens -->
  <g opacity="0.6" filter="url(#windu-blur)">
    <!-- Left screen -->
    <rect x="380" y="90" width="80" height="55" rx="3" fill="#0d0518" stroke="#9040ff" stroke-width="1" opacity="0.7"/>
    <text x="390" y="108" font-family="monospace" font-size="7" fill="#ff4060" opacity="0.8">THREAT: 2</text>
    <text x="390" y="118" font-family="monospace" font-size="7" fill="#9040ff" opacity="0.6">BLOCKED: 847</text>
    <text x="390" y="128" font-family="monospace" font-size="7" fill="#4aff6a" opacity="0.6">SHIELD: UP</text>
    <rect x="390" y="132" width="60" height="3" rx="1" fill="#300a50" opacity="0.4"/>
    <rect x="390" y="132" width="50" height="3" rx="1" fill="#9040ff" opacity="0.5"/>

    <!-- Right screen -->
    <rect x="740" y="90" width="80" height="55" rx="3" fill="#0d0518" stroke="#9040ff" stroke-width="1" opacity="0.7"/>
    <text x="750" y="108" font-family="monospace" font-size="7" fill="#9040ff" opacity="0.8">PORTS: OK</text>
    <text x="750" y="118" font-family="monospace" font-size="7" fill="#9040ff" opacity="0.6">FW RULES: 42</text>
    <text x="750" y="128" font-family="monospace" font-size="7" fill="#ff4060" opacity="0.7">ALERT: SSH</text>
    <rect x="750" y="132" width="60" height="3" rx="1" fill="#300a50" opacity="0.4"/>
    <rect x="750" y="132" width="25" height="3" rx="1" fill="#ff4060" opacity="0.6"/>
  </g>

  <!-- Scanning beam effect -->
  <g opacity="0.1">
    <polygon points="600,130 200,380 250,380" fill="#9040ff"/>
    <polygon points="600,130 950,380 1000,380" fill="#9040ff"/>
  </g>

  <!-- Floating threat indicators -->
  <g opacity="0.5">
    <circle cx="350" cy="250" r="8" fill="none" stroke="#ff4060" stroke-width="1" opacity="0.4"><animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="260" r="8" fill="none" stroke="#ff4060" stroke-width="1" opacity="0.3"><animate attributeName="r" values="5;9;5" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="290" r="10" fill="none" stroke="#4aff6a" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Stars / distant lights -->
  <g opacity="0.3">
    <circle cx="200" cy="30" r="1" fill="#c880ff"/>
    <circle cx="400" cy="20" r="0.8" fill="#fff"/>
    <circle cx="600" cy="15" r="1" fill="#c880ff"/>
    <circle cx="800" cy="25" r="0.8" fill="#fff"/>
    <circle cx="1000" cy="18" r="1" fill="#c880ff"/>
    <circle cx="150" cy="60" r="0.5" fill="#fff"/>
    <circle cx="950" cy="50" r="0.5" fill="#fff"/>
  </g>
</svg>