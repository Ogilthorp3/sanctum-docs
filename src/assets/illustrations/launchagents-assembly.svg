<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <!-- Ambient glow behind the assembly line -->
    <radialGradient id="la-glow-center" cx="50%" cy="60%" r="45%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
    <!-- Stamp glow -->
    <radialGradient id="la-stamp-glow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
    <!-- LED glow -->
    <radialGradient id="la-led" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#d4952e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d4952e" stop-opacity="0"/>
    </radialGradient>
    <!-- Cog tooth clip for clean gears -->
    <clipPath id="la-cog-clip">
      <rect x="0" y="0" width="1200" height="400"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="#0a0a0c"/>

  <!-- Ambient glow -->
  <rect width="1200" height="400" fill="url(#la-glow-center)"/>

  <!-- Conveyor belt track -->
  <rect x="0" y="280" width="1200" height="8" rx="2" fill="#1a1a2e"/>
  <rect x="0" y="280" width="1200" height="2" fill="#2a2a3e"/>
  <!-- Belt segments -->
  <g opacity="0.3">
    <rect x="40" y="282" width="30" height="4" rx="1" fill="#2a2a3e"/>
    <rect x="110" y="282" width="30" height="4" rx="1" fill="#2a2a3e"/>
    <rect x="180" y="282" width="30" height="4" rx="1" fill="#2a2a3e"/>
    <rect x="250" y="282" width="30" height="4" rx="1" fill="#2a2a3e"/>
    <rect x="320" y="282" width="30" height="4" rx="1" fill="#2a2a3e"/>
    <rect x="390" y="282" width="30" height="4" rx="1" fill="#2a2a3e"/>
    <rect x="460" y="282" width="30" height="4" rx="1" fill="#2a2a3e"/>
    <rect x="530" y="282" width="30" height="4" rx="1" fill="#2a2a3e"/>
    <rect x="600" y="282" width="30" height="4" rx="1" fill="#2a2a3e"/>
    <rect x="670" y="282" width="30" height="4" rx="1" fill="#2a2a3e"/>
    <rect x="740" y="282" width="30" height="4" rx="1" fill="#2a2a3e"/>
    <rect x="810" y="282" width="30" height="4" rx="1" fill="#2a2a3e"/>
    <rect x="880" y="282" width="30" height="4" rx="1" fill="#2a2a3e"/>
    <rect x="950" y="282" width="30" height="4" rx="1" fill="#2a2a3e"/>
    <rect x="1020" y="282" width="30" height="4" rx="1" fill="#2a2a3e"/>
    <rect x="1090" y="282" width="30" height="4" rx="1" fill="#2a2a3e"/>
  </g>

  <!-- Support legs -->
  <rect x="150" y="288" width="6" height="60" fill="#1a1a2e"/>
  <rect x="400" y="288" width="6" height="60" fill="#1a1a2e"/>
  <rect x="600" y="288" width="6" height="60" fill="#1a1a2e"/>
  <rect x="800" y="288" width="6" height="60" fill="#1a1a2e"/>
  <rect x="1050" y="288" width="6" height="60" fill="#1a1a2e"/>

  <!-- Blank plist document 1 (far left, entering) -->
  <g opacity="0.4">
    <rect x="80" y="228" width="48" height="52" rx="2" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
    <rect x="88" y="240" width="28" height="2" rx="1" fill="#2a2a3e"/>
    <rect x="88" y="248" width="22" height="2" rx="1" fill="#2a2a3e"/>
    <rect x="88" y="256" width="30" height="2" rx="1" fill="#2a2a3e"/>
    <rect x="88" y="264" width="18" height="2" rx="1" fill="#2a2a3e"/>
  </g>

  <!-- Blank plist document 2 -->
  <g opacity="0.5">
    <rect x="230" y="226" width="48" height="54" rx="2" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
    <rect x="238" y="238" width="30" height="2" rx="1" fill="#2a2a3e"/>
    <rect x="238" y="246" width="20" height="2" rx="1" fill="#2a2a3e"/>
    <rect x="238" y="254" width="32" height="2" rx="1" fill="#2a2a3e"/>
    <rect x="238" y="262" width="16" height="2" rx="1" fill="#2a2a3e"/>
  </g>

  <!-- Document under stamp (being stamped) -->
  <g>
    <rect x="476" y="224" width="52" height="56" rx="2" fill="#1a1a2e" stroke="#d4952e" stroke-width="1" stroke-opacity="0.6"/>
    <rect x="484" y="236" width="32" height="2" rx="1" fill="#d4952e" opacity="0.5"/>
    <rect x="484" y="244" width="24" height="2" rx="1" fill="#d4952e" opacity="0.5"/>
    <rect x="484" y="252" width="34" height="2" rx="1" fill="#d4952e" opacity="0.5"/>
    <rect x="484" y="260" width="20" height="2" rx="1" fill="#d4952e" opacity="0.5"/>
    <!-- Stamp imprint glow -->
    <rect x="486" y="240" width="28" height="24" rx="1" fill="url(#la-stamp-glow)" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Stamped document 1 (processed) -->
  <g opacity="0.8">
    <rect x="700" y="225" width="50" height="55" rx="2" fill="#1a1a2e" stroke="#d4952e" stroke-width="1" stroke-opacity="0.4"/>
    <rect x="708" y="237" width="30" height="2" rx="1" fill="#d4952e" opacity="0.4"/>
    <rect x="708" y="245" width="22" height="2" rx="1" fill="#d4952e" opacity="0.4"/>
    <rect x="708" y="253" width="32" height="2" rx="1" fill="#d4952e" opacity="0.4"/>
    <rect x="708" y="261" width="18" height="2" rx="1" fill="#d4952e" opacity="0.4"/>
    <!-- Stamp mark -->
    <rect x="714" y="244" width="18" height="12" rx="1" fill="none" stroke="#d4952e" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- Stamped document 2 (exiting right) -->
  <g opacity="0.65">
    <rect x="900" y="226" width="50" height="54" rx="2" fill="#1a1a2e" stroke="#d4952e" stroke-width="1" stroke-opacity="0.3"/>
    <rect x="908" y="238" width="28" height="2" rx="1" fill="#d4952e" opacity="0.3"/>
    <rect x="908" y="246" width="22" height="2" rx="1" fill="#d4952e" opacity="0.3"/>
    <rect x="908" y="254" width="30" height="2" rx="1" fill="#d4952e" opacity="0.3"/>
    <rect x="908" y="262" width="16" height="2" rx="1" fill="#d4952e" opacity="0.3"/>
    <rect x="914" y="245" width="18" height="12" rx="1" fill="none" stroke="#d4952e" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Stamped document 3 (far right, fading) -->
  <g opacity="0.35">
    <rect x="1070" y="227" width="48" height="53" rx="2" fill="#1a1a2e" stroke="#d4952e" stroke-width="1" stroke-opacity="0.2"/>
    <rect x="1078" y="239" width="26" height="2" rx="1" fill="#d4952e" opacity="0.2"/>
    <rect x="1078" y="247" width="20" height="2" rx="1" fill="#d4952e" opacity="0.2"/>
    <rect x="1078" y="255" width="28" height="2" rx="1" fill="#d4952e" opacity="0.2"/>
    <rect x="1084" y="246" width="18" height="12" rx="1" fill="none" stroke="#d4952e" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Template stamp mechanism -->
  <!-- Vertical arm -->
  <rect x="494" y="80" width="16" height="144" rx="2" fill="#2a2a3e"/>
  <!-- Stamp head -->
  <rect x="474" y="190" width="56" height="30" rx="3" fill="#2a2a3e" stroke="#d4952e" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Stamp face -->
  <rect x="480" y="216" width="44" height="6" rx="1" fill="#d4952e" opacity="0.3"/>
  <!-- Crossbar -->
  <rect x="450" y="76" width="104" height="10" rx="3" fill="#2a2a3e"/>

  <!-- Cog wheel 1 (left) -->
  <g transform="translate(320, 90)">
    <circle cx="0" cy="0" r="32" fill="none" stroke="#2a2a3e" stroke-width="3"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#2a2a3e" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="#2a2a3e"/>
    <!-- Teeth -->
    <rect x="-4" y="-36" width="8" height="10" rx="1" fill="#2a2a3e"/>
    <rect x="-4" y="26" width="8" height="10" rx="1" fill="#2a2a3e"/>
    <rect x="-36" y="-4" width="10" height="8" rx="1" fill="#2a2a3e"/>
    <rect x="26" y="-4" width="10" height="8" rx="1" fill="#2a2a3e"/>
    <!-- Diagonal teeth -->
    <rect x="19" y="-27" width="8" height="10" rx="1" fill="#2a2a3e" transform="rotate(45 23 -22)"/>
    <rect x="-27" y="17" width="8" height="10" rx="1" fill="#2a2a3e" transform="rotate(45 -23 22)"/>
    <rect x="-27" y="-27" width="8" height="10" rx="1" fill="#2a2a3e" transform="rotate(-45 -23 -22)"/>
    <rect x="19" y="17" width="8" height="10" rx="1" fill="#2a2a3e" transform="rotate(-45 23 22)"/>
    <animateTransform attributeName="transform" type="rotate" values="0 320 90;360 320 90" dur="20s" repeatCount="indefinite"/>
  </g>

  <!-- Cog wheel 2 (right, counter-rotating) -->
  <g transform="translate(680, 80)">
    <circle cx="0" cy="0" r="26" fill="none" stroke="#2a2a3e" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="17" fill="none" stroke="#2a2a3e" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="5" fill="#2a2a3e"/>
    <!-- Teeth -->
    <rect x="-3.5" y="-30" width="7" height="8" rx="1" fill="#2a2a3e"/>
    <rect x="-3.5" y="22" width="7" height="8" rx="1" fill="#2a2a3e"/>
    <rect x="-30" y="-3.5" width="8" height="7" rx="1" fill="#2a2a3e"/>
    <rect x="22" y="-3.5" width="8" height="7" rx="1" fill="#2a2a3e"/>
    <rect x="15" y="-22" width="7" height="8" rx="1" fill="#2a2a3e" transform="rotate(45 18.5 -18)"/>
    <rect x="-22" y="14" width="7" height="8" rx="1" fill="#2a2a3e" transform="rotate(45 -18.5 18)"/>
    <rect x="-22" y="-22" width="7" height="8" rx="1" fill="#2a2a3e" transform="rotate(-45 -18.5 -18)"/>
    <rect x="15" y="14" width="7" height="8" rx="1" fill="#2a2a3e" transform="rotate(-45 18.5 18)"/>
    <animateTransform attributeName="transform" type="rotate" values="360 680 80;0 680 80" dur="16s" repeatCount="indefinite"/>
  </g>

  <!-- Small cog (meshing) -->
  <g transform="translate(370, 62)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#2a2a3e" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#2a2a3e"/>
    <rect x="-3" y="-18" width="6" height="7" rx="1" fill="#2a2a3e"/>
    <rect x="-3" y="11" width="6" height="7" rx="1" fill="#2a2a3e"/>
    <rect x="-18" y="-3" width="7" height="6" rx="1" fill="#2a2a3e"/>
    <rect x="11" y="-3" width="7" height="6" rx="1" fill="#2a2a3e"/>
    <animateTransform attributeName="transform" type="rotate" values="360 370 62;0 370 62" dur="10s" repeatCount="indefinite"/>
  </g>

  <!-- Connecting rod from cog to stamp -->
  <line x1="384" y1="62" x2="502" y2="80" stroke="#2a2a3e" stroke-width="2"/>

  <!-- LED indicators on conveyor supports -->
  <!-- LED 1 -->
  <circle cx="153" y="296" r="3" fill="#d4952e" opacity="0.8">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- LED 2 -->
  <circle cx="403" cy="296" r="3" fill="#d4952e" opacity="0.6">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- LED 3 -->
  <circle cx="603" cy="296" r="3" fill="#d4952e" opacity="0.8">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- LED 4 -->
  <circle cx="803" cy="296" r="3" fill="#4a7a9b" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- LED 5 -->
  <circle cx="1053" cy="296" r="3" fill="#4a7a9b" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Floor line / shadow -->
  <rect x="0" y="352" width="1200" height="1" fill="#1a1a2e" opacity="0.5"/>

  <!-- Label -->
  <text x="502" y="380" font-family="monospace" font-size="10" fill="#d4952e" opacity="0.5" text-anchor="middle">TEMPLATE FORGE</text>
</svg>