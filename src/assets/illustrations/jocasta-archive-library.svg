<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="jBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0a06"/>
      <stop offset="100%" stop-color="#0a0804"/>
    </linearGradient>
    <radialGradient id="jGlow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#jBg)"/>
  <rect width="1200" height="400" fill="url(#jGlow)"/>
  <!-- Infinite bookshelves receding into distance -->
  <g opacity="0.2" stroke="#d4952e" stroke-width="1" fill="none">
    <rect x="80" y="60" width="60" height="280" rx="2"/>
    <rect x="160" y="60" width="60" height="280" rx="2"/>
    <rect x="240" y="60" width="60" height="280" rx="2"/>
    <rect x="320" y="80" width="55" height="260" rx="2" opacity="0.7"/>
    <rect x="395" y="100" width="50" height="240" rx="2" opacity="0.5"/>
    <rect x="465" y="110" width="45" height="230" rx="2" opacity="0.4"/>
    <rect x="530" y="120" width="40" height="220" rx="2" opacity="0.3"/>
    <rect x="590" y="130" width="35" height="210" rx="2" opacity="0.2"/>
  </g>
  <!-- Shelf lines (books) -->
  <g opacity="0.15" stroke="#d4952e" stroke-width="0.5">
    <line x1="85" y1="120" x2="135" y2="120"/>
    <line x1="85" y1="180" x2="135" y2="180"/>
    <line x1="85" y1="240" x2="135" y2="240"/>
    <line x1="165" y1="120" x2="215" y2="120"/>
    <line x1="165" y1="180" x2="215" y2="180"/>
    <line x1="165" y1="240" x2="215" y2="240"/>
    <line x1="245" y1="120" x2="295" y2="120"/>
    <line x1="245" y1="180" x2="295" y2="180"/>
    <line x1="245" y1="240" x2="295" y2="240"/>
  </g>
  <!-- CRM data panel -->
  <g opacity="0.3">
    <rect x="750" y="100" width="350" height="200" rx="12" fill="none" stroke="#d4952e" stroke-width="1"/>
    <text x="925" y="140" text-anchor="middle" fill="#d4952e" font-family="monospace" font-size="11">RELATIONSHIP INDEX</text>
    <line x1="780" y1="155" x2="1070" y2="155" stroke="#d4952e" stroke-width="0.5" opacity="0.3"/>
    <text x="800" y="180" fill="#6e6e73" font-family="monospace" font-size="9">contacts</text>
    <text x="800" y="200" fill="#6e6e73" font-family="monospace" font-size="9">last_interaction</text>
    <text x="800" y="220" fill="#6e6e73" font-family="monospace" font-size="9">birthdays_30d</text>
    <text x="800" y="240" fill="#6e6e73" font-family="monospace" font-size="9">channels</text>
    <text x="1050" y="180" text-anchor="end" fill="#d4952e" font-family="monospace" font-size="9">1,247</text>
    <text x="1050" y="200" text-anchor="end" fill="#d4952e" font-family="monospace" font-size="9">today</text>
    <text x="1050" y="220" text-anchor="end" fill="#d4952e" font-family="monospace" font-size="9">3</text>
    <text x="1050" y="240" text-anchor="end" fill="#d4952e" font-family="monospace" font-size="9">iMessage, Signal, Slack</text>
  </g>
  <!-- Warm particles -->
  <circle cx="650" cy="200" r="2" fill="#d4952e" opacity="0.2"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="5s" repeatCount="indefinite"/></circle>
</svg>
