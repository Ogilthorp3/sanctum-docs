<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="aBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060a10"/>
      <stop offset="50%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#080c12"/>
    </linearGradient>
    <radialGradient id="aGlow" cx="75%" cy="40%" r="30%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#aBg)"/>
  <rect width="1200" height="400" fill="url(#aGlow)"/>
  <!-- Mountain silhouette -->
  <polygon points="0,350 150,220 300,280 450,180 600,250 750,200 900,260 1050,190 1200,300 1200,400 0,400" fill="#0d1118" opacity="0.8"/>
  <polygon points="0,370 200,280 400,320 550,240 700,300 850,250 1000,310 1200,270 1200,400 0,400" fill="#111520" opacity="0.6"/>
  <!-- Stars -->
  <circle cx="100" cy="50" r="1" fill="#e8e8ed" opacity="0.4"/>
  <circle cx="250" cy="80" r="1.5" fill="#e8e8ed" opacity="0.3"/>
  <circle cx="400" cy="30" r="1" fill="#e8e8ed" opacity="0.5"/>
  <circle cx="550" cy="70" r="1" fill="#e8e8ed" opacity="0.3"/>
  <circle cx="700" cy="40" r="1.5" fill="#e8e8ed" opacity="0.4"/>
  <circle cx="850" cy="60" r="1" fill="#e8e8ed" opacity="0.5"/>
  <circle cx="1000" cy="35" r="1" fill="#e8e8ed" opacity="0.3"/>
  <circle cx="1100" cy="75" r="1.5" fill="#e8e8ed" opacity="0.4"/>
  <!-- Chalet (small, warm light) -->
  <rect x="880" y="230" width="60" height="40" rx="2" fill="#111520" stroke="#d4952e" stroke-width="0.5" opacity="0.6"/>
  <polygon points="870,230 910,200 950,230" fill="#111520" stroke="#d4952e" stroke-width="0.5" opacity="0.6"/>
  <rect x="900" y="242" width="12" height="15" rx="1" fill="#d4952e" opacity="0.3"/>
  <!-- Tailscale connection beam to hub -->
  <line x1="910" y1="250" x2="200" y2="150" stroke="#d4952e" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.2">
    <animate attributeName="stroke-dashoffset" values="8;0" dur="2s" repeatCount="indefinite"/>
  </line>
  <circle cx="200" cy="150" r="4" fill="none" stroke="#d4952e" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="150" r="2" fill="#d4952e" opacity="0.4"/>
  <!-- Labels -->
  <text x="200" y="175" text-anchor="middle" fill="#424245" font-family="monospace" font-size="9">HUB</text>
  <text x="910" y="290" text-anchor="middle" fill="#424245" font-family="monospace" font-size="9">SATELLITE</text>
  <text x="600" y="390" text-anchor="middle" fill="#424245" font-family="monospace" font-size="10" letter-spacing="2">LAURENTIANS • INDEPENDENT OPS</text>
</svg>
