<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <!-- Central document glow -->
    <radialGradient id="iy-center-glow" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#d4952e" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
    <!-- Outer ring glow -->
    <radialGradient id="iy-ring-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0a0c" stop-opacity="0"/>
      <stop offset="60%" stop-color="#4a7a9b" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
    <!-- Service node glow -->
    <radialGradient id="iy-node-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4952e" stop-opacity="0"/>
    </radialGradient>
    <!-- Blue node glow -->
    <radialGradient id="iy-node-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a7a9b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4a7a9b" stop-opacity="0"/>
    </radialGradient>
    <!-- Line pulse gradient -->
    <linearGradient id="iy-pulse-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0"/>
      <stop offset="40%" stop-color="#d4952e" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#d4952e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4952e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="#0a0a0c"/>

  <!-- Ambient glows -->
  <rect width="1200" height="400" fill="url(#iy-center-glow)"/>
  <rect width="1200" height="400" fill="url(#iy-ring-glow)"/>

  <!-- Orbital ring (subtle) -->
  <ellipse cx="600" cy="200" rx="340" ry="160" fill="none" stroke="#1a1a2e" stroke-width="0.5" opacity="0.4"/>
  <ellipse cx="600" cy="200" rx="380" ry="175" fill="none" stroke="#1a1a2e" stroke-width="0.3" opacity="0.2"/>

  <!-- Connection lines from center to service nodes -->
  <!-- Line to Node 1 (top-left) — gateway -->
  <line x1="600" y1="175" x2="310" y2="70" stroke="#2a2a3e" stroke-width="1" opacity="0.6"/>
  <circle cx="310" cy="70" r="4" fill="#d4952e" opacity="0">
    <animate attributeName="cx" values="600;310" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="175;70" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Line to Node 2 (top) — agents -->
  <line x1="600" y1="170" x2="600" y2="36" stroke="#2a2a3e" stroke-width="1" opacity="0.6"/>
  <circle cx="600" cy="36" r="4" fill="#d4952e" opacity="0">
    <animate attributeName="cy" values="170;36" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Line to Node 3 (top-right) — tunnel -->
  <line x1="600" y1="175" x2="890" y2="70" stroke="#2a2a3e" stroke-width="1" opacity="0.6"/>
  <circle cx="890" cy="70" r="4" fill="#4a7a9b" opacity="0">
    <animate attributeName="cx" values="600;890" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="175;70" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Line to Node 4 (right) — proxy -->
  <line x1="635" y1="200" x2="980" y2="200" stroke="#2a2a3e" stroke-width="1" opacity="0.6"/>
  <circle cx="980" cy="200" r="4" fill="#d4952e" opacity="0">
    <animate attributeName="cx" values="635;980" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Line to Node 5 (bottom-right) — homeassistant -->
  <line x1="600" y1="225" x2="890" y2="330" stroke="#2a2a3e" stroke-width="1" opacity="0.6"/>
  <circle cx="890" cy="330" r="4" fill="#4a7a9b" opacity="0">
    <animate attributeName="cx" values="600;890" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="225;330" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Line to Node 6 (bottom) — watchdog -->
  <line x1="600" y1="230" x2="600" y2="364" stroke="#2a2a3e" stroke-width="1" opacity="0.6"/>
  <circle cx="600" cy="364" r="4" fill="#d4952e" opacity="0">
    <animate attributeName="cy" values="230;364" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Line to Node 7 (bottom-left) — docker -->
  <line x1="600" y1="225" x2="310" y2="330" stroke="#2a2a3e" stroke-width="1" opacity="0.6"/>
  <circle cx="310" cy="330" r="4" fill="#4a7a9b" opacity="0">
    <animate attributeName="cx" values="600;310" dur="3.1s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="225;330" dur="3.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="3.1s" repeatCount="indefinite"/>
  </circle>

  <!-- Line to Node 8 (left) — firewalla -->
  <line x1="565" y1="200" x2="220" y2="200" stroke="#2a2a3e" stroke-width="1" opacity="0.6"/>
  <circle cx="220" cy="200" r="4" fill="#d4952e" opacity="0">
    <animate attributeName="cx" values="565;220" dur="2.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="2.9s" repeatCount="indefinite"/>
  </circle>

  <!-- Service nodes (perimeter) -->

  <!-- Node 1: top-left (square — gateway) -->
  <circle cx="310" cy="70" r="20" fill="url(#iy-node-glow)" opacity="0.5"/>
  <rect x="296" y="56" width="28" height="28" rx="3" fill="#1a1a2e" stroke="#d4952e" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="303" y="64" width="14" height="2" rx="1" fill="#d4952e" opacity="0.4"/>
  <rect x="303" y="70" width="10" height="2" rx="1" fill="#d4952e" opacity="0.3"/>
  <rect x="303" y="76" width="12" height="2" rx="1" fill="#2a2a3e" opacity="0.4"/>
  <text x="310" y="100" font-family="monospace" font-size="9" fill="#d4952e" opacity="0.45" text-anchor="middle">gateway</text>

  <!-- Node 2: top (circle — agents) -->
  <circle cx="600" cy="36" r="20" fill="url(#iy-node-glow)" opacity="0.5"/>
  <circle cx="600" cy="36" r="14" fill="#1a1a2e" stroke="#d4952e" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="596" cy="33" r="2.5" fill="#d4952e" opacity="0.4"/>
  <circle cx="604" cy="33" r="2.5" fill="#d4952e" opacity="0.3"/>
  <circle cx="600" cy="40" r="2.5" fill="#d4952e" opacity="0.35"/>
  <text x="600" y="64" font-family="monospace" font-size="9" fill="#d4952e" opacity="0.45" text-anchor="middle">agents</text>

  <!-- Node 3: top-right (square — tunnel) -->
  <circle cx="890" cy="70" r="20" fill="url(#iy-node-blue)" opacity="0.5"/>
  <rect x="876" y="56" width="28" height="28" rx="3" fill="#1a1a2e" stroke="#4a7a9b" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="883" y="64" width="14" height="2" rx="1" fill="#4a7a9b" opacity="0.4"/>
  <rect x="883" y="70" width="8" height="2" rx="1" fill="#4a7a9b" opacity="0.3"/>
  <rect x="883" y="76" width="12" height="2" rx="1" fill="#2a2a3e" opacity="0.4"/>
  <text x="890" y="100" font-family="monospace" font-size="9" fill="#4a7a9b" opacity="0.45" text-anchor="middle">tunnel</text>

  <!-- Node 4: right (hexagon-ish — proxy) -->
  <circle cx="980" cy="200" r="20" fill="url(#iy-node-glow)" opacity="0.5"/>
  <polygon points="980,184 996,192 996,208 980,216 964,208 964,192" fill="#1a1a2e" stroke="#d4952e" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="973" y="196" width="14" height="2" rx="1" fill="#d4952e" opacity="0.4"/>
  <rect x="975" y="202" width="10" height="2" rx="1" fill="#d4952e" opacity="0.3"/>
  <text x="980" y="232" font-family="monospace" font-size="9" fill="#d4952e" opacity="0.45" text-anchor="middle">proxy</text>

  <!-- Node 5: bottom-right (circle — homeassistant) -->
  <circle cx="890" cy="330" r="20" fill="url(#iy-node-blue)" opacity="0.5"/>
  <circle cx="890" cy="330" r="14" fill="#1a1a2e" stroke="#4a7a9b" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="882" y="326" width="16" height="2" rx="1" fill="#4a7a9b" opacity="0.4"/>
  <rect x="884" y="332" width="12" height="2" rx="1" fill="#4a7a9b" opacity="0.3"/>
  <text x="890" y="358" font-family="monospace" font-size="9" fill="#4a7a9b" opacity="0.45" text-anchor="middle">home</text>

  <!-- Node 6: bottom (square — watchdog) -->
  <circle cx="600" cy="364" r="20" fill="url(#iy-node-glow)" opacity="0.5"/>
  <rect x="586" y="350" width="28" height="28" rx="3" fill="#1a1a2e" stroke="#d4952e" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Eye icon (watchdog) -->
  <ellipse cx="600" cy="364" rx="8" ry="5" fill="none" stroke="#d4952e" stroke-width="0.8" opacity="0.4"/>
  <circle cx="600" cy="364" r="2.5" fill="#d4952e" opacity="0.35"/>
  <text x="600" y="392" font-family="monospace" font-size="9" fill="#d4952e" opacity="0.45" text-anchor="middle">watchdog</text>

  <!-- Node 7: bottom-left (circle — docker) -->
  <circle cx="310" cy="330" r="20" fill="url(#iy-node-blue)" opacity="0.5"/>
  <circle cx="310" cy="330" r="14" fill="#1a1a2e" stroke="#4a7a9b" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="302" y="326" width="6" height="6" rx="1" fill="#4a7a9b" opacity="0.3"/>
  <rect x="310" y="326" width="6" height="6" rx="1" fill="#4a7a9b" opacity="0.25"/>
  <rect x="306" y="333" width="6" height="6" rx="1" fill="#4a7a9b" opacity="0.2"/>
  <text x="310" y="358" font-family="monospace" font-size="9" fill="#4a7a9b" opacity="0.45" text-anchor="middle">docker</text>

  <!-- Node 8: left (hexagon-ish — firewalla) -->
  <circle cx="220" cy="200" r="20" fill="url(#iy-node-glow)" opacity="0.5"/>
  <polygon points="220,184 236,192 236,208 220,216 204,208 204,192" fill="#1a1a2e" stroke="#d4952e" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Shield icon -->
  <path d="M220,192 L228,196 L228,204 Q228,210 220,212 Q212,210 212,204 L212,196 Z" fill="none" stroke="#d4952e" stroke-width="0.8" opacity="0.4"/>
  <text x="220" y="232" font-family="monospace" font-size="9" fill="#d4952e" opacity="0.45" text-anchor="middle">firewall</text>

  <!-- Central YAML document -->
  <!-- Document shadow / glow -->
  <rect x="556" y="156" width="88" height="90" rx="4" fill="#d4952e" opacity="0.04"/>

  <!-- Main document -->
  <rect x="560" y="152" width="80" height="96" rx="4" fill="#1a1a2e" stroke="#d4952e" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- YAML content lines (abstract) -->
  <rect x="572" y="166" width="36" height="2.5" rx="1" fill="#d4952e" opacity="0.5"/>
  <rect x="576" y="176" width="28" height="2" rx="1" fill="#2a2a3e" opacity="0.5"/>
  <rect x="576" y="184" width="40" height="2" rx="1" fill="#2a2a3e" opacity="0.4"/>
  <rect x="572" y="194" width="32" height="2.5" rx="1" fill="#d4952e" opacity="0.4"/>
  <rect x="576" y="204" width="24" height="2" rx="1" fill="#2a2a3e" opacity="0.4"/>
  <rect x="576" y="212" width="36" height="2" rx="1" fill="#2a2a3e" opacity="0.35"/>
  <rect x="572" y="222" width="28" height="2.5" rx="1" fill="#d4952e" opacity="0.35"/>
  <rect x="576" y="232" width="32" height="2" rx="1" fill="#2a2a3e" opacity="0.3"/>

  <!-- Central pulse animation -->
  <rect x="560" y="152" width="80" height="96" rx="4" fill="none" stroke="#d4952e" stroke-width="1.5" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner bracket decorations -->
  <path d="M555,155 L555,148 L562,148" fill="none" stroke="#d4952e" stroke-width="1" opacity="0.3"/>
  <path d="M645,155 L645,148 L638,148" fill="none" stroke="#d4952e" stroke-width="1" opacity="0.3"/>
  <path d="M555,245 L555,252 L562,252" fill="none" stroke="#d4952e" stroke-width="1" opacity="0.3"/>
  <path d="M645,245 L645,252 L638,252" fill="none" stroke="#d4952e" stroke-width="1" opacity="0.3"/>

  <!-- Label -->
  <text x="600" y="270" font-family="monospace" font-size="10" fill="#d4952e" opacity="0.55" text-anchor="middle">instance.yaml</text>
</svg>