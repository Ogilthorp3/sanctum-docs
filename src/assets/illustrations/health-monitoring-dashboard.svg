<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <!-- Screen glow -->
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
    <!-- ECG line glow -->
    <filter id="ecgGlow" x="-5%" y="-50%" width="110%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Data point glow -->
    <radialGradient id="dataPointGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#d4952e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#d4952e" stop-opacity="0"/>
    </radialGradient>
    <!-- Blue data point -->
    <radialGradient id="blueDataPoint" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a7a9b" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#4a7a9b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4a7a9b" stop-opacity="0"/>
    </radialGradient>
    <!-- Body silhouette gradient -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a3e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="400" fill="#0a0a0c"/>

  <!-- Subtle screen ambient -->
  <rect width="1200" height="400" fill="url(#screenGlow)"/>

  <!-- Grid lines (clinical dashboard feel) -->
  <g stroke="#1a1a2e" stroke-width="0.5" opacity="0.4">
    <!-- Horizontal grid -->
    <line x1="80" y1="80" x2="1120" y2="80"/>
    <line x1="80" y1="130" x2="1120" y2="130"/>
    <line x1="80" y1="180" x2="1120" y2="180"/>
    <line x1="80" y1="230" x2="1120" y2="230"/>
    <line x1="80" y1="280" x2="1120" y2="280"/>
    <line x1="80" y1="330" x2="1120" y2="330"/>
    <!-- Vertical grid -->
    <line x1="80" y1="50" x2="80" y2="360"/>
    <line x1="280" y1="50" x2="280" y2="360"/>
    <line x1="480" y1="50" x2="480" y2="360"/>
    <line x1="680" y1="50" x2="680" y2="360"/>
    <line x1="880" y1="50" x2="880" y2="360"/>
    <line x1="1120" y1="50" x2="1120" y2="360"/>
  </g>

  <!-- === LEFT SECTION: Data stream bars === -->
  <g transform="translate(100, 70)">
    <!-- Vertical bars of varying heights -->
    <rect x="0" y="180" width="8" height="80" rx="1" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="0.5"/>
    <rect x="0" y="200" width="8" height="60" rx="1" fill="#d4952e" opacity="0.3"/>

    <rect x="16" y="140" width="8" height="120" rx="1" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="0.5"/>
    <rect x="16" y="175" width="8" height="85" rx="1" fill="#d4952e" opacity="0.4"/>

    <rect x="32" y="100" width="8" height="160" rx="1" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="0.5"/>
    <rect x="32" y="155" width="8" height="105" rx="1" fill="#d4952e" opacity="0.5"/>

    <rect x="48" y="130" width="8" height="130" rx="1" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="0.5"/>
    <rect x="48" y="165" width="8" height="95" rx="1" fill="#d4952e" opacity="0.45"/>

    <rect x="64" y="80" width="8" height="180" rx="1" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="0.5"/>
    <rect x="64" y="140" width="8" height="120" rx="1" fill="#d4952e" opacity="0.55"/>

    <rect x="80" y="160" width="8" height="100" rx="1" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="0.5"/>
    <rect x="80" y="195" width="8" height="65" rx="1" fill="#4a7a9b" opacity="0.4"/>

    <rect x="96" y="110" width="8" height="150" rx="1" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="0.5"/>
    <rect x="96" y="160" width="8" height="100" rx="1" fill="#4a7a9b" opacity="0.5"/>

    <rect x="112" y="150" width="8" height="110" rx="1" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="0.5"/>
    <rect x="112" y="185" width="8" height="75" rx="1" fill="#4a7a9b" opacity="0.35"/>

    <!-- Breathing animation on tallest bar -->
    <rect x="64" y="140" width="8" height="120" rx="1" fill="#d4952e" opacity="0.55">
      <animate attributeName="opacity" values="0.55;0.25;0.55" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Small indicator dots below bars -->
  <g transform="translate(100, 340)">
    <circle cx="4" cy="0" r="2" fill="#d4952e" opacity="0.4"/>
    <circle cx="20" cy="0" r="2" fill="#d4952e" opacity="0.5"/>
    <circle cx="36" cy="0" r="2" fill="#d4952e" opacity="0.6"/>
    <circle cx="52" cy="0" r="2" fill="#d4952e" opacity="0.5"/>
    <circle cx="68" cy="0" r="2" fill="#d4952e" opacity="0.7"/>
    <circle cx="84" cy="0" r="2" fill="#4a7a9b" opacity="0.4"/>
    <circle cx="100" cy="0" r="2" fill="#4a7a9b" opacity="0.5"/>
    <circle cx="116" cy="0" r="2" fill="#4a7a9b" opacity="0.35"/>
  </g>

  <!-- === CENTER SECTION: ECG Heartbeat waveform === -->
  <g filter="url(#ecgGlow)">
    <polyline
      fill="none"
      stroke="#d4952e"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.85"
      points="
        250,200
        290,200
        310,200
        330,198
        340,195
        350,200
        370,200
        390,200
        400,200
        410,195
        415,185
        420,170
        425,220
        428,260
        432,150
        436,120
        440,200
        445,215
        450,205
        455,200
        470,200
        490,200
        510,198
        520,190
        525,195
        530,200
        550,200
        570,200
        590,200
        600,195
        605,185
        610,170
        615,220
        618,260
        622,150
        626,120
        630,200
        635,215
        640,205
        645,200
        660,200
        680,200
        700,198
        710,190
        715,195
        720,200
        740,200
        760,200
        780,200
        790,195
        795,185
        800,170
        805,220
        808,260
        812,150
        816,120
        820,200
        825,215
        830,205
        835,200
        850,200
      "/>
  </g>

  <!-- ECG baseline reference (faint) -->
  <line x1="250" y1="200" x2="850" y2="200" stroke="#2a2a3e" stroke-width="0.5" stroke-dasharray="4,8" opacity="0.3"/>

  <!-- === RIGHT SECTION: Body silhouette with data points === -->
  <g transform="translate(950, 50)">
    <!-- Body silhouette (simplified human outline) -->
    <g fill="none" stroke="#2a2a3e" stroke-width="1.5" opacity="0.5">
      <!-- Head -->
      <circle cx="0" cy="30" r="22"/>
      <!-- Neck -->
      <line x1="0" y1="52" x2="0" y2="65"/>
      <!-- Shoulders -->
      <line x1="-45" y1="75" x2="45" y2="75"/>
      <!-- Torso -->
      <path d="M -35 75 L -35 170 Q -35 180 -25 185 L 25 185 Q 35 180 35 170 L 35 75"/>
      <!-- Left arm -->
      <path d="M -45 75 L -60 130 L -55 175"/>
      <!-- Right arm -->
      <path d="M 45 75 L 60 130 L 55 175"/>
      <!-- Left leg -->
      <path d="M -25 185 L -30 250 L -28 300"/>
      <!-- Right leg -->
      <path d="M 25 185 L 30 250 L 28 300"/>
    </g>

    <!-- Data points on body -->
    <!-- Head/Brain -->
    <circle cx="0" cy="30" r="8" fill="url(#dataPointGlow)">
      <animate attributeName="r" values="8;10;8" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="30" r="3" fill="#d4952e" opacity="0.9"/>

    <!-- Heart -->
    <circle cx="8" cy="110" r="10" fill="url(#dataPointGlow)"/>
    <circle cx="8" cy="110" r="4" fill="#d4952e" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.2s" repeatCount="indefinite"/>
    </circle>

    <!-- Left shoulder -->
    <circle cx="-40" cy="78" r="6" fill="url(#blueDataPoint)"/>
    <circle cx="-40" cy="78" r="2.5" fill="#4a7a9b" opacity="0.8"/>

    <!-- Right shoulder -->
    <circle cx="40" cy="78" r="6" fill="url(#blueDataPoint)"/>
    <circle cx="40" cy="78" r="2.5" fill="#4a7a9b" opacity="0.8"/>

    <!-- Gut/Core -->
    <circle cx="0" cy="155" r="7" fill="url(#blueDataPoint)"/>
    <circle cx="0" cy="155" r="3" fill="#4a7a9b" opacity="0.7"/>

    <!-- Left knee -->
    <circle cx="-28" cy="250" r="5" fill="url(#blueDataPoint)"/>
    <circle cx="-28" cy="250" r="2" fill="#4a7a9b" opacity="0.6"/>

    <!-- Right knee -->
    <circle cx="28" cy="250" r="5" fill="url(#blueDataPoint)"/>
    <circle cx="28" cy="250" r="2" fill="#4a7a9b" opacity="0.6"/>
  </g>

  <!-- Connection lines from body to data area -->
  <g stroke="#2a2a3e" stroke-width="0.5" stroke-dasharray="3,6" opacity="0.25">
    <line x1="850" y1="200" x2="958" y2="160"/>
    <line x1="850" y1="180" x2="950" y2="80"/>
  </g>

  <!-- Dashboard frame border -->
  <rect x="60" y="40" width="1080" height="330" rx="4" fill="none" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>

  <!-- Top status indicators -->
  <g transform="translate(80, 55)">
    <circle cx="0" cy="0" r="3" fill="#d4952e" opacity="0.6"/>
    <circle cx="14" cy="0" r="3" fill="#4a7a9b" opacity="0.4"/>
    <circle cx="28" cy="0" r="3" fill="#2a2a3e" opacity="0.5"/>
  </g>

  <!-- Decorative corner brackets -->
  <g stroke="#2a2a3e" stroke-width="1" fill="none" opacity="0.3">
    <path d="M 30 30 L 30 15 L 45 15"/>
    <path d="M 1170 30 L 1170 15 L 1155 15"/>
    <path d="M 30 370 L 30 385 L 45 385"/>
    <path d="M 1170 370 L 1170 385 L 1155 385"/>
  </g>
</svg>