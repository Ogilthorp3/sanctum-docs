<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="Sanctum Proxy 6-layer routing engine showing request flow through quality tier, task type, cost, latency, provider health, and budget breaker layers">
  <defs>
    <filter id="proxy-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d4952e"/>
    </marker>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&amp;display=swap');

    .comic { font-family: 'Bangers', 'Impact', 'Arial Black', cursive; letter-spacing: 2px; }
    .mono { font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace; font-weight: 700; }

    .h-xl { font-size: 24px; fill: #d4952e; }
    .h-lg { font-size: 20px; fill: currentColor; }
    .h-md { font-size: 17px; fill: currentColor; }
    .label { font-size: 13px; fill: currentColor; opacity: 0.9; }
    .label-sm { font-size: 11px; fill: currentColor; opacity: 0.7; }
    .port { font-size: 13px; fill: #d4952e; font-weight: 800; }
    .subtitle { font-size: 12px; fill: currentColor; opacity: 0.5; font-weight: 600; }
    .section-head { font-size: 11px; fill: currentColor; opacity: 0.45; font-weight: 800; letter-spacing: 3px; }
    .accent { fill: #d4952e; }
    .layer-num { font-size: 28px; fill: #d4952e; font-weight: 900; opacity: 0.3; }

    .box { fill: none; stroke: currentColor; stroke-width: 2; opacity: 0.3; }
    .box-hero { fill: none; stroke: #d4952e; stroke-width: 3; opacity: 0.7; }
    .box-header { fill: #d4952e; opacity: 0.1; }
    .line { stroke: currentColor; stroke-width: 1.5; opacity: 0.3; }
    .line-bold { stroke: currentColor; stroke-width: 2; opacity: 0.4; }
    .divider { stroke: currentColor; stroke-width: 1; opacity: 0.12; }

    .dot-amber { fill: #d4952e; }
    .dot-purple { fill: #bf5af2; }
    .dot-green { fill: #30d158; }
    .dot-blue { fill: #64d2ff; }
    .dot-orange { fill: #ff9f0a; }
    .dot-red { fill: #ff453a; }
  </style>

  <text x="600" y="38" text-anchor="middle" class="comic h-xl">SANCTUM PROXY — 6-LAYER ROUTING ENGINE</text>
  <text x="600" y="58" text-anchor="middle" class="mono subtitle">4.6MB Rust binary · port :4040 · 17 models · 12 fallback chains</text>

  <g transform="translate(600, 90)">
    <rect x="-120" y="0" width="240" height="40" rx="20" fill="#d4952e" opacity="0.15" stroke="#d4952e" stroke-width="2" stroke-opacity="0.5"/>
    <text x="0" y="26" text-anchor="middle" class="comic h-md" style="fill: #d4952e;">INCOMING REQUEST</text>
  </g>

  <line x1="600" y1="132" x2="600" y2="150" stroke="#d4952e" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g transform="translate(600, 158)">
    <rect x="-380" y="0" width="760" height="90" rx="8" class="box-hero"/>
    <rect x="-380" y="0" width="760" height="34" rx="8" class="box-header"/>
    <rect x="-380" y="24" width="760" height="10" class="box-header"/>
    <text x="-358" y="24" class="mono layer-num">1</text>
    <text x="0" y="25" text-anchor="middle" class="comic h-md">QUALITY TIER</text>
    <text x="358" y="24" text-anchor="end" class="mono port" style="font-size: 11px; opacity: 0.6;">THE VELVET ROPE</text>

    <text x="-350" y="56" class="mono label">Tier 0 → NEVER reroute</text>
    <text x="-350" y="76" class="mono label-sm" style="opacity: 0.55;">claude-opus-4-6, council-secure</text>

    <text x="80" y="56" class="mono label">Go directly to Anthropic.</text>
    <text x="80" y="76" class="mono label-sm" style="opacity: 0.55;">Do not pass Go. No token collecting.</text>
  </g>

  <line x1="980" y1="203" x2="1040" y2="203" stroke="#d4952e" stroke-width="2" stroke-dasharray="6 3" opacity="0.5"/>
  <text x="1050" y="200" class="mono label-sm" style="fill: #d4952e; opacity: 0.7;">→ Anthropic</text>
  <text x="1050" y="214" class="mono label-sm" style="opacity: 0.35;">direct pass</text>

  <line x1="600" y1="250" x2="600" y2="268" stroke="#d4952e" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>
  <text x="615" y="264" class="mono" style="font-size: 10px; fill: currentColor; opacity: 0.35;">not tier 0</text>

  <g transform="translate(600, 276)">
    <rect x="-380" y="0" width="760" height="90" rx="8" class="box"/>
    <rect x="-380" y="0" width="760" height="34" rx="8" class="box-header"/>
    <rect x="-380" y="24" width="760" height="10" class="box-header"/>
    <text x="-358" y="24" class="mono layer-num">2</text>
    <text x="0" y="25" text-anchor="middle" class="comic h-md">TASK TYPE</text>
    <text x="358" y="24" text-anchor="end" class="mono port" style="font-size: 11px; opacity: 0.6;">CONTENT ROUTING</text>

    <circle cx="-350" cy="58" r="5" class="dot-blue" opacity="0.7"/>
    <text x="-336" y="62" class="mono label">Vision → Gemini</text>

    <circle cx="-110" cy="58" r="5" class="dot-purple" opacity="0.7"/>
    <text x="-96" y="62" class="mono label">Code → strongest</text>

    <circle cx="140" cy="58" r="5" class="dot-red" opacity="0.7"/>
    <text x="154" y="62" class="mono label">Security → council-secure</text>

    <text x="-350" y="80" class="mono label-sm" style="opacity: 0.4;">smart content-based routing · Gemini-first for non-code</text>
  </g>

  <line x1="600" y1="368" x2="600" y2="386" stroke="#d4952e" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>
  <text x="615" y="382" class="mono" style="font-size: 10px; fill: currentColor; opacity: 0.35;">no strong match</text>

  <g transform="translate(600, 394)">
    <rect x="-380" y="0" width="760" height="90" rx="8" class="box"/>
    <rect x="-380" y="0" width="760" height="34" rx="8" class="box-header"/>
    <rect x="-380" y="24" width="760" height="10" class="box-header"/>
    <text x="-358" y="24" class="mono layer-num">3</text>
    <text x="0" y="25" text-anchor="middle" class="comic h-md">COST OPTIMIZATION</text>
    <text x="358" y="24" text-anchor="end" class="mono port" style="font-size: 11px; opacity: 0.6;">THE ACCOUNTANT</text>

    <text x="-350" y="58" class="mono label">Free tokens → Cheap → Paid → Local</text>
    <text x="-350" y="78" class="mono label-sm" style="opacity: 0.55;">Claude Max 500K free daily → OpenRouter → Gemini → Apple Silicon</text>
  </g>

  <line x1="600" y1="486" x2="600" y2="504" stroke="#d4952e" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>

  <g transform="translate(600, 512)">
    <rect x="-380" y="0" width="760" height="72" rx="8" class="box" style="stroke-dasharray: 6 4;"/>
    <rect x="-380" y="0" width="760" height="34" rx="8" class="box-header" style="opacity: 0.06;"/>
    <rect x="-380" y="24" width="760" height="10" class="box-header" style="opacity: 0.06;"/>
    <text x="-358" y="24" class="mono layer-num" style="opacity: 0.15;">4</text>
    <text x="0" y="25" text-anchor="middle" class="comic h-md" style="opacity: 0.5;">LATENCY</text>
    <text x="358" y="24" text-anchor="end" class="mono" style="font-size: 11px; fill: currentColor; opacity: 0.3;">PLACEHOLDER</text>

    <text x="-350" y="56" class="mono label-sm" style="opacity: 0.35;">(future) prefer local for health checks and heartbeats</text>
  </g>

  <line x1="600" y1="586" x2="600" y2="604" stroke="#d4952e" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>

  <g transform="translate(600, 612)">
    <rect x="-380" y="0" width="760" height="90" rx="8" class="box"/>
    <rect x="-380" y="0" width="760" height="34" rx="8" class="box-header"/>
    <rect x="-380" y="24" width="760" height="10" class="box-header"/>
    <text x="-358" y="24" class="mono layer-num">5</text>
    <text x="0" y="25" text-anchor="middle" class="comic h-md">PROVIDER HEALTH</text>
    <text x="358" y="24" text-anchor="end" class="mono port" style="font-size: 11px; opacity: 0.6;">ERROR TRACKING</text>

    <text x="-350" y="58" class="mono label">&gt;30% error rate? Skip that provider.</text>
    <text x="-350" y="78" class="mono label-sm" style="opacity: 0.55;">exponential decay · automatic failover to next in fallback chain</text>
  </g>

  <line x1="600" y1="704" x2="600" y2="722" stroke="#d4952e" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>

  <g transform="translate(600, 730)">
    <rect x="-380" y="0" width="760" height="90" rx="8" fill="none" stroke="#ff453a" stroke-width="3" opacity="0.5"/>
    <rect x="-380" y="0" width="760" height="34" rx="8" fill="#ff453a" opacity="0.08"/>
    <rect x="-380" y="24" width="760" height="10" fill="#ff453a" opacity="0.08"/>
    <text x="-358" y="24" class="mono layer-num" style="fill: #ff453a;">6</text>
    <text x="0" y="25" text-anchor="middle" class="comic h-md" style="fill: #ff453a;">BUDGET BREAKER</text>
    <text x="358" y="24" text-anchor="end" class="mono" style="font-size: 11px; fill: #ff453a; opacity: 0.6; font-weight: 800;">THE BOUNCER</text>

    <text x="-350" y="58" class="mono label">Agent over daily limit? ALL traffic → local.</text>
    <text x="-350" y="78" class="mono label-sm" style="opacity: 0.55;">500K tokens/agent/day · AtomicI64 counters · no exceptions</text>
  </g>

  <line x1="980" y1="775" x2="1040" y2="775" stroke="#ff453a" stroke-width="2" stroke-dasharray="6 3" opacity="0.5"/>
  <text x="1050" y="772" class="mono label-sm" style="fill: #ff453a; opacity: 0.7;">→ Apple Silicon</text>
  <text x="1050" y="786" class="mono label-sm" style="opacity: 0.35;">local fallback</text>

  <g transform="translate(100, 158)">
    <text x="0" y="0" class="comic section-head" style="font-size: 12px;">PROVIDERS</text>

    <circle cx="10" cy="24" r="5" class="dot-amber" opacity="0.7"/>
    <text x="24" y="28" class="mono label-sm">Anthropic</text>

    <circle cx="10" cy="46" r="5" class="dot-green" opacity="0.7"/>
    <text x="24" y="50" class="mono label-sm">OpenRouter</text>

    <circle cx="10" cy="68" r="5" class="dot-blue" opacity="0.7"/>
    <text x="24" y="72" class="mono label-sm">Gemini</text>

    <circle cx="10" cy="90" r="5" class="dot-orange" opacity="0.7"/>
    <text x="24" y="94" class="mono label-sm">Local (MLX)</text>
  </g>

  <g transform="translate(600, 870)">
    <text x="0" y="0" text-anchor="middle" class="mono" style="font-size: 11px; fill: currentColor; opacity: 0.35;">58 tests · streaming token tracking · JSONL audit log · config.yaml driven</text>
  </g>

  <g opacity="0.3">
    <circle cx="80" cy="400" r="1.5" class="dot-amber"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1120" cy="350" r="1.5" class="dot-amber"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="650" r="1" class="dot-blue"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="550" r="1" class="dot-purple"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="820" r="1" class="dot-red"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="3.8s" repeatCount="indefinite"/></circle>
  </g>
</svg>