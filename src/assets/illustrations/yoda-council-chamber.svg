<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <radialGradient id="yoda-glow" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#1a3a5c" stop-opacity="1"/>
      <stop offset="60%" stop-color="#0a1628" stop-opacity="1"/>
      <stop offset="100%" stop-color="#050d18" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="yoda-amber" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#d4a050" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4a050" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="yoda-blue" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>
    <filter id="yoda-blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="yoda-glow-filter">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <linearGradient id="yoda-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1a2e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#050d18" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#yoda-glow)"/>

  <!-- Floor reflection -->
  <rect x="0" y="280" width="1200" height="120" fill="url(#yoda-floor)"/>
  <line x1="0" y1="280" x2="1200" y2="280" stroke="#1a3050" stroke-width="0.5" opacity="0.5"/>

  <!-- Server rack columns (council seats) -->
  <g opacity="0.6">
    <!-- Left racks -->
    <rect x="50" y="80" width="40" height="200" rx="3" fill="#0d1825" stroke="#1a3050" stroke-width="1"/>
    <rect x="55" y="90" width="30" height="6" rx="1" fill="#0a4a7a" opacity="0.6"/>
    <rect x="55" y="100" width="30" height="6" rx="1" fill="#0a4a7a" opacity="0.4"/>
    <rect x="55" y="110" width="30" height="6" rx="1" fill="#0a6a4a" opacity="0.5"/>
    <rect x="55" y="120" width="30" height="6" rx="1" fill="#0a4a7a" opacity="0.3"/>
    <rect x="55" y="140" width="30" height="6" rx="1" fill="#d4a050" opacity="0.4"/>
    <rect x="55" y="150" width="30" height="6" rx="1" fill="#0a4a7a" opacity="0.5"/>
    <rect x="55" y="160" width="30" height="6" rx="1" fill="#0a4a7a" opacity="0.6"/>
    <circle cx="58" cy="93" r="1.5" fill="#4a9eff" opacity="0.8"/>
    <circle cx="58" cy="143" r="1.5" fill="#d4a050" opacity="0.8"/>

    <rect x="110" y="100" width="40" height="180" rx="3" fill="#0d1825" stroke="#1a3050" stroke-width="1"/>
    <rect x="115" y="110" width="30" height="6" rx="1" fill="#0a4a7a" opacity="0.5"/>
    <rect x="115" y="120" width="30" height="6" rx="1" fill="#0a4a7a" opacity="0.3"/>
    <rect x="115" y="130" width="30" height="6" rx="1" fill="#d4a050" opacity="0.3"/>
    <rect x="115" y="150" width="30" height="6" rx="1" fill="#0a4a7a" opacity="0.6"/>
    <circle cx="118" cy="113" r="1.5" fill="#4a9eff" opacity="0.6"/>

    <!-- Right racks -->
    <rect x="1110" y="80" width="40" height="200" rx="3" fill="#0d1825" stroke="#1a3050" stroke-width="1"/>
    <rect x="1115" y="90" width="30" height="6" rx="1" fill="#0a4a7a" opacity="0.6"/>
    <rect x="1115" y="100" width="30" height="6" rx="1" fill="#0a4a7a" opacity="0.4"/>
    <rect x="1115" y="110" width="30" height="6" rx="1" fill="#0a6a4a" opacity="0.5"/>
    <rect x="1115" y="130" width="30" height="6" rx="1" fill="#d4a050" opacity="0.4"/>
    <rect x="1115" y="140" width="30" height="6" rx="1" fill="#0a4a7a" opacity="0.5"/>
    <circle cx="1138" cy="93" r="1.5" fill="#4a9eff" opacity="0.8"/>
    <circle cx="1138" cy="133" r="1.5" fill="#d4a050" opacity="0.8"/>

    <rect x="1050" y="100" width="40" height="180" rx="3" fill="#0d1825" stroke="#1a3050" stroke-width="1"/>
    <rect x="1055" y="110" width="30" height="6" rx="1" fill="#0a4a7a" opacity="0.5"/>
    <rect x="1055" y="120" width="30" height="6" rx="1" fill="#0a4a7a" opacity="0.3"/>
    <rect x="1055" y="140" width="30" height="6" rx="1" fill="#0a4a7a" opacity="0.6"/>
    <circle cx="1058" cy="113" r="1.5" fill="#4a9eff" opacity="0.6"/>

    <!-- Mid-left racks -->
    <rect x="220" y="120" width="35" height="160" rx="3" fill="#0d1825" stroke="#1a3050" stroke-width="0.8"/>
    <rect x="225" y="130" width="25" height="5" rx="1" fill="#0a4a7a" opacity="0.4"/>
    <rect x="225" y="140" width="25" height="5" rx="1" fill="#0a4a7a" opacity="0.3"/>

    <!-- Mid-right racks -->
    <rect x="945" y="120" width="35" height="160" rx="3" fill="#0d1825" stroke="#1a3050" stroke-width="0.8"/>
    <rect x="950" y="130" width="25" height="5" rx="1" fill="#0a4a7a" opacity="0.4"/>
    <rect x="950" y="140" width="25" height="5" rx="1" fill="#0a4a7a" opacity="0.3"/>
  </g>

  <!-- Holographic displays (left) -->
  <g opacity="0.5" filter="url(#yoda-blur)">
    <rect x="300" y="100" width="120" height="80" rx="5" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
    <text x="315" y="125" font-family="monospace" font-size="8" fill="#4a9eff" opacity="0.8">CPU: 12%</text>
    <text x="315" y="138" font-family="monospace" font-size="8" fill="#4a9eff" opacity="0.6">MEM: 8.2G</text>
    <text x="315" y="151" font-family="monospace" font-size="8" fill="#4aff6a" opacity="0.7">ALL OK</text>
    <rect x="315" y="158" width="90" height="3" rx="1" fill="#0a4a7a" opacity="0.4"/>
    <rect x="315" y="158" width="35" height="3" rx="1" fill="#4a9eff" opacity="0.6"/>
    <rect x="315" y="164" width="90" height="3" rx="1" fill="#0a4a7a" opacity="0.4"/>
    <rect x="315" y="164" width="70" height="3" rx="1" fill="#4aff6a" opacity="0.5"/>
  </g>

  <!-- Holographic displays (right) -->
  <g opacity="0.5" filter="url(#yoda-blur)">
    <rect x="780" y="100" width="120" height="80" rx="5" fill="none" stroke="#d4a050" stroke-width="1.5"/>
    <text x="795" y="125" font-family="monospace" font-size="8" fill="#d4a050" opacity="0.8">AGENTS: 5</text>
    <text x="795" y="138" font-family="monospace" font-size="8" fill="#d4a050" opacity="0.6">UPTIME: 99.9</text>
    <text x="795" y="151" font-family="monospace" font-size="8" fill="#d4a050" opacity="0.7">COUNCIL: ON</text>
    <rect x="795" y="158" width="90" height="3" rx="1" fill="#5a3a10" opacity="0.4"/>
    <rect x="795" y="158" width="80" height="3" rx="1" fill="#d4a050" opacity="0.5"/>
  </g>

  <!-- Central meditation figure (silhouette) -->
  <g transform="translate(600, 200)">
    <!-- Ambient glow -->
    <ellipse cx="0" cy="60" rx="80" ry="15" fill="#4a9eff" opacity="0.08" filter="url(#yoda-glow-filter)"/>
    <ellipse cx="0" cy="0" rx="60" ry="60" fill="url(#yoda-blue)" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="40" ry="40" fill="url(#yoda-amber)" opacity="0.4"/>

    <!-- Seated figure silhouette -->
    <ellipse cx="0" cy="50" rx="35" ry="12" fill="#0a1628" opacity="0.9"/>
    <!-- Body -->
    <path d="M-25,45 Q-30,20 -20,-10 Q-15,-25 0,-35 Q15,-25 20,-10 Q30,20 25,45 Z" fill="#0d1a2e" stroke="#1a3050" stroke-width="0.5"/>
    <!-- Head -->
    <circle cx="0" cy="-45" r="15" fill="#0d1a2e" stroke="#1a3050" stroke-width="0.5"/>
    <!-- Inner peace glow -->
    <circle cx="0" cy="-15" r="5" fill="#d4a050" opacity="0.15" filter="url(#yoda-glow-filter)"/>
  </g>

  <!-- Floating particles -->
  <g opacity="0.4">
    <circle cx="400" cy="150" r="1" fill="#4a9eff"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="100" r="1.5" fill="#d4a050"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="120" r="1" fill="#4a9eff"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="200" r="1.5" fill="#d4a050"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="250" r="1" fill="#4a9eff"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="80" r="1" fill="#4a9eff"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="550" cy="180" r="0.8" fill="#d4a050"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="90" r="1.2" fill="#4a9eff"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Subtle grid on floor -->
  <g opacity="0.1" stroke="#4a9eff" stroke-width="0.5">
    <line x1="200" y1="280" x2="400" y2="400"/>
    <line x1="400" y1="280" x2="500" y2="400"/>
    <line x1="600" y1="280" x2="600" y2="400"/>
    <line x1="800" y1="280" x2="700" y2="400"/>
    <line x1="1000" y1="280" x2="800" y2="400"/>
  </g>
</svg>