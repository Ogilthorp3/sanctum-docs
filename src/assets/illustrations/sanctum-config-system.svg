<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" role="img" aria-label="Sanctum config system hierarchy showing instance.yaml as source of truth flowing to JSON cache, shell library, TypeScript library, plist templates, and secrets stores">
  <defs>
    <filter id="cfg-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&amp;display=swap');

    .comic { font-family: 'Bangers', 'Impact', 'Arial Black', cursive; letter-spacing: 2px; }
    .mono { font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace; font-weight: 700; }

    .h-xl { font-size: 24px; fill: #d4952e; }
    .h-lg { font-size: 20px; fill: currentColor; }
    .h-md { font-size: 17px; fill: currentColor; }
    .label { font-size: 14px; fill: currentColor; opacity: 0.9; }
    .label-sm { font-size: 12px; fill: currentColor; opacity: 0.7; }
    .port { font-size: 13px; fill: #d4952e; font-weight: 800; }
    .subtitle { font-size: 12px; fill: currentColor; opacity: 0.5; font-weight: 600; }
    .section-head { font-size: 11px; fill: currentColor; opacity: 0.45; font-weight: 800; letter-spacing: 3px; }
    .file-name { font-size: 13px; fill: #d4952e; font-weight: 800; }

    .box { fill: none; stroke: currentColor; stroke-width: 2; opacity: 0.3; }
    .box-hero { fill: none; stroke: #d4952e; stroke-width: 3; opacity: 0.7; }
    .box-header { fill: #d4952e; opacity: 0.1; }
    .divider { stroke: currentColor; stroke-width: 1; opacity: 0.12; }
    .flow-line { stroke: #d4952e; stroke-width: 2; opacity: 0.4; }

    .dot-amber { fill: #d4952e; }
    .dot-purple { fill: #bf5af2; }
    .dot-green { fill: #30d158; }
    .dot-blue { fill: #64d2ff; }
    .dot-orange { fill: #ff9f0a; }
    .dot-red { fill: #ff453a; }
  </style>

  <text x="600" y="38" text-anchor="middle" class="comic h-xl">CONFIG SYSTEM</text>
  <text x="600" y="58" text-anchor="middle" class="mono subtitle">single source of truth · one YAML to rule them all</text>

  <g transform="translate(600, 110)">
    <rect x="-200" y="-30" width="400" height="100" rx="12" class="box-hero" filter="url(#cfg-glow)"/>
    <rect x="-200" y="-30" width="400" height="42" rx="12" class="box-header"/>
    <rect x="-200" y="0" width="400" height="12" class="box-header"/>
    <text x="-170" y="-2" style="font-size: 22px; fill: #d4952e; opacity: 0.6;">♫</text>
    <text x="0" y="0" text-anchor="middle" class="comic h-lg" style="fill: #d4952e;">INSTANCE.YAML</text>
    <text x="0" y="28" text-anchor="middle" class="mono file-name" style="font-size: 11px; opacity: 0.5;">~/.sanctum/instance.yaml</text>
    <text x="0" y="48" text-anchor="middle" class="mono label-sm" style="opacity: 0.4;">hand-edited · network · services · nodes · flags</text>
  </g>

  <line x1="600" y1="182" x2="600" y2="220" class="flow-line"/>
  <circle cx="600" cy="220" r="5" class="dot-amber" opacity="0.7"/>

  <path d="M600,220 L155,220 L155,270" fill="none" class="flow-line"/>
  <path d="M600,220 L440,220 L440,270" fill="none" class="flow-line"/>
  <path d="M600,220 L760,220 L760,270" fill="none" class="flow-line"/>
  <path d="M600,220 L1045,220 L1045,270" fill="none" class="flow-line"/>

  <g transform="translate(155, 275)">
    <rect x="-115" y="0" width="230" height="125" rx="8" class="box"/>
    <rect x="-115" y="0" width="230" height="32" rx="8" class="box-header"/>
    <rect x="-115" y="22" width="230" height="10" class="box-header"/>
    <circle cx="-95" cy="16" r="6" class="dot-green" opacity="0.5"/>
    <text x="0" y="23" text-anchor="middle" class="comic" style="font-size: 15px; fill: currentColor;">JSON CACHE</text>

    <text x="-95" y="50" class="mono file-name" style="font-size: 11px;">.instance.json</text>
    <text x="-95" y="68" class="mono label-sm" style="font-size: 11px; opacity: 0.45;">auto-generated</text>
    <text x="-95" y="86" class="mono label-sm" style="font-size: 11px; opacity: 0.45;">YAML → JSON</text>
    <text x="-95" y="104" class="mono label-sm" style="font-size: 11px; opacity: 0.45;">never edit by hand</text>
  </g>

  <g transform="translate(440, 275)">
    <rect x="-120" y="0" width="240" height="125" rx="8" class="box"/>
    <rect x="-120" y="0" width="240" height="32" rx="8" class="box-header"/>
    <rect x="-120" y="22" width="240" height="10" class="box-header"/>
    <circle cx="-100" cy="16" r="6" class="dot-amber" opacity="0.5"/>
    <text x="0" y="23" text-anchor="middle" class="comic" style="font-size: 15px; fill: currentColor;">SHELL LIB</text>

    <text x="-100" y="50" class="mono file-name" style="font-size: 11px;">config.sh</text>
    <text x="-100" y="68" class="mono label-sm" style="font-size: 11px; opacity: 0.45;">sanctum_get()</text>
    <text x="-100" y="86" class="mono label-sm" style="font-size: 11px; opacity: 0.45;">sanctum_enabled()</text>
    <text x="-100" y="104" class="mono label-sm" style="font-size: 11px; opacity: 0.45;">sanctum_expand()</text>
  </g>

  <g transform="translate(760, 275)">
    <rect x="-120" y="0" width="240" height="125" rx="8" class="box"/>
    <rect x="-120" y="0" width="240" height="32" rx="8" class="box-header"/>
    <rect x="-120" y="22" width="240" height="10" class="box-header"/>
    <circle cx="-100" cy="16" r="6" class="dot-blue" opacity="0.5"/>
    <text x="0" y="23" text-anchor="middle" class="comic" style="font-size: 15px; fill: currentColor;">TS LIBRARY</text>

    <text x="-100" y="50" class="mono file-name" style="font-size: 11px;">config.ts</text>
    <text x="-100" y="68" class="mono label-sm" style="font-size: 11px; opacity: 0.45;">get(), isEnabled()</text>
    <text x="-100" y="86" class="mono label-sm" style="font-size: 11px; opacity: 0.45;">expand(), vmSsh()</text>
    <text x="-100" y="104" class="mono label-sm" style="font-size: 11px; opacity: 0.45;">nodeGet(), whoami()</text>
  </g>

  <g transform="translate(1045, 275)">
    <rect x="-115" y="0" width="230" height="125" rx="8" class="box"/>
    <rect x="-115" y="0" width="230" height="32" rx="8" class="box-header"/>
    <rect x="-115" y="22" width="230" height="10" class="box-header"/>
    <circle cx="-95" cy="16" r="6" class="dot-orange" opacity="0.5"/>
    <text x="0" y="23" text-anchor="middle" class="comic" style="font-size: 14px; fill: currentColor;">PLIST TEMPLATES</text>

    <text x="-95" y="50" class="mono file-name" style="font-size: 10px;">templates/launchagents/</text>
    <text x="-95" y="68" class="mono label-sm" style="font-size: 11px; opacity: 0.45;">11+ templates</text>
    <text x="-95" y="86" class="mono label-sm" style="font-size: 11px; opacity: 0.45;">generate-plists.sh</text>
    <text x="-95" y="104" class="mono label-sm" style="font-size: 11px; opacity: 0.45;">→ ~/Library/LaunchAgents/</text>
  </g>

  <path d="M1045,403 L1045,435" fill="none" class="flow-line"/>

  <g transform="translate(1045, 440)">
    <rect x="-115" y="0" width="230" height="50" rx="8" fill="none" stroke="#d4952e" stroke-width="2" opacity="0.4" stroke-dasharray="6 3"/>
    <text x="0" y="22" text-anchor="middle" class="comic" style="font-size: 13px; fill: #d4952e; opacity: 0.7;">20+ GENERATED PLISTS</text>
    <text x="0" y="40" text-anchor="middle" class="mono label-sm" style="font-size: 10px; opacity: 0.4;">RunAtLoad · KeepAlive</text>
  </g>

  <text x="600" y="445" text-anchor="middle" class="comic section-head" style="font-size: 13px; letter-spacing: 3px;">SECRETS — NEVER IN YAML</text>

  <line x1="600" y1="220" x2="600" y2="430" class="flow-line" style="stroke-dasharray: 6 4; opacity: 0.2;"/>

  <path d="M600,455 L450,455 L450,480" fill="none" class="flow-line" style="stroke-dasharray: 5 3; opacity: 0.3;"/>
  <path d="M600,455 L750,455 L750,480" fill="none" class="flow-line" style="stroke-dasharray: 5 3; opacity: 0.3;"/>

  <g transform="translate(450, 485)">
    <rect x="-140" y="0" width="280" height="105" rx="8" fill="none" stroke="#bf5af2" stroke-width="2" opacity="0.4"/>
    <rect x="-140" y="0" width="280" height="32" rx="8" fill="#bf5af2" opacity="0.06"/>
    <rect x="-140" y="22" width="280" height="10" fill="#bf5af2" opacity="0.06"/>
    <text x="0" y="23" text-anchor="middle" class="comic" style="font-size: 15px; fill: #bf5af2; opacity: 0.8;">macOS KEYCHAIN</text>

    <text x="-120" y="50" class="mono label-sm" style="font-size: 11px; opacity: 0.5;">tokens &amp; API keys</text>
    <text x="-120" y="68" class="mono label-sm" style="font-size: 11px; opacity: 0.5;">security find-generic-password</text>
    <text x="-120" y="86" class="mono label-sm" style="font-size: 11px; opacity: 0.5;">rotated monthly · 1st @ 3:30 AM</text>
  </g>

  <g transform="translate(750, 485)">
    <rect x="-140" y="0" width="280" height="105" rx="8" fill="none" stroke="#bf5af2" stroke-width="2" opacity="0.4"/>
    <rect x="-140" y="0" width="280" height="32" rx="8" fill="#bf5af2" opacity="0.06"/>
    <rect x="-140" y="22" width="280" height="10" fill="#bf5af2" opacity="0.06"/>
    <text x="0" y="23" text-anchor="middle" class="comic" style="font-size: 15px; fill: #bf5af2; opacity: 0.8;">SOPS + AGE</text>

    <text x="-120" y="50" class="mono label-sm" style="font-size: 11px; opacity: 0.5;">VM-side encrypted secrets</text>
    <text x="-120" y="68" class="mono label-sm" style="font-size: 11px; opacity: 0.5;">secrets.enc.yaml</text>
    <text x="-120" y="86" class="mono label-sm" style="font-size: 11px; opacity: 0.5;">decrypted to env vars only</text>
  </g>

  <g transform="translate(155, 440)">
    <rect x="-115" y="0" width="230" height="150" rx="8" class="box" style="opacity: 0.2;"/>
    <text x="0" y="20" text-anchor="middle" class="comic section-head" style="font-size: 12px;">ADD A SERVICE</text>

    <text x="-95" y="42" class="mono label-sm" style="font-size: 11px; opacity: 0.4;">1. Add to instance.yaml</text>
    <text x="-95" y="58" class="mono label-sm" style="font-size: 11px; opacity: 0.4;">2. Create plist template</text>
    <text x="-95" y="74" class="mono label-sm" style="font-size: 11px; opacity: 0.4;">3. Secrets → Keychain</text>
    <text x="-95" y="90" class="mono label-sm" style="font-size: 11px; opacity: 0.4;">4. generate-plists.sh</text>
    <text x="-95" y="106" class="mono label-sm" style="font-size: 11px; opacity: 0.4;">5. Add to node list</text>
    <text x="-95" y="122" class="mono label-sm" style="font-size: 11px; opacity: 0.4;">6. Update watchdog</text>

    <text x="0" y="144" text-anchor="middle" class="mono" style="font-size: 9px; fill: #d4952e; opacity: 0.5;">6 steps → never think about it again</text>
  </g>

  <g transform="translate(600, 770)">
    <text x="0" y="0" text-anchor="middle" class="mono" style="font-size: 11px; fill: currentColor; opacity: 0.35;">one file · one indentation error away from a very quiet house</text>
  </g>

  <g opacity="0.3">
    <circle cx="70" cy="200" r="1.5" class="dot-amber"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="680" r="1.5" class="dot-purple"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="700" r="1" class="dot-blue"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="100" cy="650" r="1" class="dot-green"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="4.5s" repeatCount="indefinite"/></circle>
  </g>
</svg>