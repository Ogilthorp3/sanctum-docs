<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" role="img" aria-label="Sanctum network topology showing Internet, Cloudflare Tunnel, Tailscale, Mac Mini host, and Ubuntu VM agent cluster connected via bridge100">
  <defs>
    <filter id="topo-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="topo-bridge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#d4952e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d4952e" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&amp;display=swap');

    .comic { font-family: 'Bangers', 'Impact', 'Arial Black', cursive; letter-spacing: 2px; }
    .mono { font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace; font-weight: 700; }

    .h-xl { font-size: 24px; fill: #d4952e; }
    .h-lg { font-size: 20px; fill: currentColor; }
    .h-md { font-size: 17px; fill: currentColor; }
    .label { font-size: 14px; fill: currentColor; opacity: 0.9; }
    .label-sm { font-size: 12px; fill: currentColor; opacity: 0.7; }
    .port { font-size: 13px; fill: #d4952e; font-weight: 800; }
    .subtitle { font-size: 12px; fill: currentColor; opacity: 0.5; font-weight: 600; }
    .section-head { font-size: 11px; fill: currentColor; opacity: 0.45; font-weight: 800; letter-spacing: 3px; }
    .accent { fill: #d4952e; }

    .box { fill: none; stroke: currentColor; stroke-width: 2; opacity: 0.3; }
    .box-hero { fill: none; stroke: #d4952e; stroke-width: 3; opacity: 0.7; }
    .box-header { fill: #d4952e; opacity: 0.1; }
    .line { stroke: currentColor; stroke-width: 1.5; opacity: 0.3; }
    .line-bold { stroke: currentColor; stroke-width: 2; opacity: 0.4; }
    .divider { stroke: currentColor; stroke-width: 1; opacity: 0.12; }

    .dot-amber { fill: #d4952e; }
    .dot-purple { fill: #bf5af2; }
    .dot-green { fill: #30d158; }
    .dot-blue { fill: #64d2ff; }
    .dot-orange { fill: #ff9f0a; }
    .dot-red { fill: #ff453a; }
  </style>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="800" fill="white"/>

  <!-- ==================== INTERNET ==================== -->
  <g transform="translate(600, 40)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="11" ry="22" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
    <line x1="-19" y1="-11" x2="19" y2="-11" stroke="currentColor" stroke-width="1" opacity="0.2"/>
    <line x1="-19" y1="11" x2="19" y2="11" stroke="currentColor" stroke-width="1" opacity="0.2"/>
    <text x="0" y="42" text-anchor="middle" class="comic h-lg">INTERNET</text>
  </g>

  <!-- Trunk line down -->
  <line x1="600" y1="72" x2="600" y2="110" class="line-bold"/>
  <!-- Junction -->
  <circle cx="600" cy="110" r="5" class="dot-amber" opacity="0.8"/>

  <!-- Branch left -->
  <path d="M600,110 L380,110 L380,140" fill="none" class="line-bold"/>
  <!-- Branch right -->
  <path d="M600,110 L820,110 L820,140" fill="none" class="line-bold"/>

  <!-- ==================== CLOUDFLARE TUNNEL ==================== -->
  <g transform="translate(380, 140)">
    <rect x="-160" y="0" width="320" height="100" rx="8" class="box"/>
    <rect x="-160" y="0" width="320" height="36" rx="8" class="box-header"/>
    <rect x="-160" y="26" width="320" height="10" class="box-header"/>
    <text x="0" y="25" text-anchor="middle" class="comic h-md">CLOUDFLARE TUNNEL</text>
    <text x="0" y="44" text-anchor="middle" class="mono subtitle">haus</text>

    <text x="-140" y="68" class="mono label-sm">health.nepveu.name</text>
    <text x="140" y="68" text-anchor="end" class="mono port">→ :10101</text>
    <text x="-140" y="88" class="mono label-sm">ha.nepveu.name</text>
    <text x="140" y="88" text-anchor="end" class="mono port">→ :8123</text>
  </g>

  <!-- ==================== TAILSCALE ==================== -->
  <g transform="translate(820, 140)">
    <rect x="-160" y="0" width="320" height="80" rx="8" class="box"/>
    <rect x="-160" y="0" width="320" height="36" rx="8" class="box-header"/>
    <rect x="-160" y="26" width="320" height="10" class="box-header"/>
    <text x="0" y="25" text-anchor="middle" class="comic h-md">TAILSCALE</text>
    <text x="0" y="44" text-anchor="middle" class="mono subtitle">tail7c6d11.ts.net</text>
    <text x="0" y="66" text-anchor="middle" class="mono label-sm" style="opacity: 0.4;">encrypted mesh VPN</text>
  </g>

  <!-- Lines down to main boxes -->
  <path d="M380,240 L380,280 L445,310" fill="none" class="line-bold"/>
  <path d="M820,220 L820,280 L755,310" fill="none" class="line-bold"/>

  <!-- ==================== bridge100 ==================== -->
  <g transform="translate(600, 320)">
    <!-- Thick glowing bridge line -->
    <line x1="-160" y1="0" x2="160" y2="0" stroke="url(#topo-bridge)" stroke-width="4.5" filter="url(#topo-glow)"/>
    <!-- Endpoint dots -->
    <circle cx="-160" cy="0" r="6" class="dot-amber" opacity="0.9"/>
    <circle cx="160" cy="0" r="6" class="dot-amber" opacity="0.9"/>
    <!-- Center label -->
    <rect x="-72" y="-16" width="144" height="32" rx="6" fill="currentColor" opacity="0.06" stroke="#d4952e" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="0" y="6" text-anchor="middle" class="comic" style="font-size: 16px; fill: #d4952e;">BRIDGE100</text>
    <text x="0" y="30" text-anchor="middle" class="mono" style="font-size: 10px; fill: currentColor; opacity: 0.4;">10.10.10.0/24</text>
  </g>

  <!-- ==================== MAC MINI ==================== -->
  <g transform="translate(280, 310)">
    <rect x="-195" y="0" width="390" height="450" rx="10" class="box-hero"/>

    <!-- Header -->
    <rect x="-195" y="0" width="390" height="42" rx="10" class="box-header"/>
    <rect x="-195" y="28" width="390" height="14" class="box-header"/>
    <text x="0" y="30" text-anchor="middle" class="comic h-xl">MAC MINI M4 PRO</text>
    <text x="174" y="28" text-anchor="end" class="mono port" style="font-size: 10px; opacity: 0.6;">10.10.10.1</text>

    <!-- Services -->
    <g class="mono" transform="translate(-173, 62)">
      <text x="0" y="0" class="section-head">AGENTS &amp; AI</text>

      <text x="0" y="26" class="label">Council MLX</text>
      <text x="330" y="26" text-anchor="end" class="port">:1337</text>

      <text x="0" y="50" class="label">Sanctum Proxy</text>
      <text x="330" y="50" text-anchor="end" class="port">:4040</text>

      <text x="0" y="74" class="label">XTTS Voice</text>
      <text x="330" y="74" text-anchor="end" class="port">:8008</text>

      <text x="0" y="98" class="label">Anthropic Proxy</text>
      <text x="330" y="98" text-anchor="end" class="port">:2001</text>

      <text x="0" y="122" class="label">Graffiti</text>
      <text x="330" y="122" text-anchor="end" class="port">:31416</text>

      <line x1="0" y1="140" x2="330" y2="140" class="divider"/>

      <text x="0" y="160" class="section-head">HOME &amp; NETWORK</text>

      <text x="0" y="186" class="label">Firewalla</text>
      <text x="330" y="186" text-anchor="end" class="port">:1984</text>

      <text x="0" y="210" class="label">Ecobee</text>
      <text x="330" y="210" text-anchor="end" class="port">:42069</text>

      <text x="0" y="234" class="label">Signal Proxy</text>
      <text x="330" y="234" text-anchor="end" class="port">:5150</text>

      <text x="0" y="258" class="label">Network Control</text>
      <text x="330" y="258" text-anchor="end" class="port">:4007</text>

      <line x1="0" y1="276" x2="330" y2="276" class="divider"/>

      <text x="0" y="298" class="label" style="opacity: 0.55;">20+ LaunchAgents</text>
      <text x="330" y="298" text-anchor="end" class="port" style="opacity: 0.55; font-size: 10px;">RunAtLoad</text>
    </g>

    <!-- Badge -->
    <g transform="translate(0, 420)">
      <rect x="-52" y="-5" width="104" height="24" rx="12" fill="#d4952e" opacity="0.12" stroke="#d4952e" stroke-width="1" stroke-opacity="0.35"/>
      <text x="0" y="12" text-anchor="middle" class="comic" style="font-size: 13px; fill: #d4952e; opacity: 0.8;">9 SERVICES</text>
    </g>
  </g>

  <!-- ==================== UBUNTU VM ==================== -->
  <g transform="translate(920, 310)">
    <rect x="-195" y="0" width="390" height="470" rx="10" class="box-hero"/>

    <!-- Header -->
    <rect x="-195" y="0" width="390" height="42" rx="10" class="box-header"/>
    <rect x="-195" y="28" width="390" height="14" class="box-header"/>
    <text x="0" y="30" text-anchor="middle" class="comic h-xl">UBUNTU 24.04 VM</text>
    <text x="174" y="28" text-anchor="end" class="mono port" style="font-size: 10px; opacity: 0.6;">10.10.10.10</text>

    <g class="mono" transform="translate(-173, 62)">
      <!-- Gateway -->
      <text x="0" y="0" class="label">OpenClaw Gateway</text>
      <text x="330" y="0" text-anchor="end" class="port">:1977</text>

      <text x="0" y="24" class="label">Health Ingester</text>
      <text x="330" y="24" text-anchor="end" class="port">:10101</text>

      <line x1="0" y1="42" x2="330" y2="42" class="divider"/>

      <!-- Agent cluster header -->
      <text x="0" y="64" class="comic section-head" style="font-size: 13px; letter-spacing: 3px;">AGENT CLUSTER</text>

      <!-- Yoda -->
      <circle cx="10" cy="90" r="6" class="dot-amber" opacity="0.7"/>
      <text x="26" y="95" class="label" style="font-weight: 800;">Yoda</text>
      <text x="330" y="95" text-anchor="end" class="label-sm" style="opacity: 0.55;">main agent</text>

      <!-- Windu -->
      <circle cx="10" cy="118" r="6" class="dot-purple" opacity="0.7"/>
      <text x="26" y="123" class="label" style="font-weight: 800;">Windu</text>
      <text x="330" y="123" text-anchor="end" class="label-sm" style="opacity: 0.55;">security</text>

      <!-- Qui-Gon -->
      <circle cx="10" cy="146" r="6" class="dot-green" opacity="0.7"/>
      <text x="26" y="151" class="label" style="font-weight: 800;">Qui-Gon</text>
      <text x="330" y="151" text-anchor="end" class="label-sm" style="opacity: 0.55;">efficiency</text>

      <!-- Cilghal -->
      <circle cx="10" cy="174" r="6" class="dot-blue" opacity="0.7"/>
      <text x="26" y="179" class="label" style="font-weight: 800;">Cilghal</text>
      <text x="330" y="179" text-anchor="end" class="label-sm" style="opacity: 0.55;">health</text>

      <!-- Mundi -->
      <circle cx="10" cy="202" r="6" class="dot-orange" opacity="0.7"/>
      <text x="26" y="207" class="label" style="font-weight: 800;">Mundi</text>
      <text x="330" y="207" text-anchor="end" class="label-sm" style="opacity: 0.55;">finance</text>

      <line x1="0" y1="224" x2="330" y2="224" class="divider"/>

      <!-- Plugins -->
      <text x="0" y="246" class="section-head">SKILLS &amp; PLUGINS</text>

      <text x="0" y="272" class="label">Skills Repository</text>
      <text x="330" y="272" text-anchor="end" class="label-sm" style="opacity: 0.5;">git sync 30m</text>

      <text x="0" y="296" class="label" style="opacity: 0.7;">Supermemory</text>
      <text x="330" y="296" text-anchor="end" class="label-sm" style="opacity: 0.45;">long-term memory</text>

      <text x="0" y="320" class="label" style="opacity: 0.7;">neo4j-kg</text>
      <text x="330" y="320" text-anchor="end" class="label-sm" style="opacity: 0.45;">knowledge graph</text>
    </g>

    <!-- Badge -->
    <g transform="translate(0, 440)">
      <rect x="-48" y="-5" width="96" height="24" rx="12" fill="#d4952e" opacity="0.12" stroke="#d4952e" stroke-width="1" stroke-opacity="0.35"/>
      <text x="0" y="12" text-anchor="middle" class="comic" style="font-size: 13px; fill: #d4952e; opacity: 0.8;">5 AGENTS</text>
    </g>
  </g>

  <!-- ==================== AIR-GAP NOTE ==================== -->
  <g transform="translate(600, 782)">
    <line x1="-240" y1="-12" x2="240" y2="-12" stroke="#ff453a" stroke-width="1" opacity="0.25" stroke-dasharray="5 5"/>
    <text x="0" y="4" text-anchor="middle" class="comic" style="font-size: 13px; fill: #ff453a; opacity: 0.6; letter-spacing: 2px;">⚠ VM HAS NO DIRECT INTERNET ACCESS</text>
    <text x="0" y="20" text-anchor="middle" class="mono" style="font-size: 10px; fill: currentColor; opacity: 0.35;">all external traffic routes through Mac host</text>
  </g>

  <!-- ==================== AMBIENT PARTICLES ==================== -->
  <g opacity="0.3">
    <circle cx="130" cy="480" r="1.5" class="dot-amber"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="280" r="1.5" class="dot-amber"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="1070" cy="480" r="1.5" class="dot-amber"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="440" cy="600" r="1" class="dot-blue"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="600" r="1" class="dot-blue"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="380" r="1" class="dot-purple"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="400" r="1" class="dot-green"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="3.8s" repeatCount="indefinite"/></circle>
  </g>
</svg>
