<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <!-- Terminal inner glow -->
    <radialGradient id="cli-glow" cx="35%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
    <!-- Cursor glow -->
    <radialGradient id="cli-cursor-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#d4952e" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#d4952e" stop-opacity="0"/>
    </radialGradient>
    <!-- Side panel glow -->
    <radialGradient id="cli-side-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4a7a9b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="#0a0a0c"/>

  <!-- Terminal window frame -->
  <rect x="80" y="30" width="820" height="340" rx="8" fill="#0d0d12" stroke="#1a1a2e" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="80" y="30" width="820" height="32" rx="8" fill="#1a1a2e"/>
  <rect x="80" y="54" width="820" height="8" fill="#1a1a2e"/>
  <!-- Window dots -->
  <circle cx="104" cy="46" r="5" fill="#3a2020" opacity="0.8"/>
  <circle cx="122" cy="46" r="5" fill="#3a3520" opacity="0.8"/>
  <circle cx="140" cy="46" r="5" fill="#1a2a1a" opacity="0.8"/>

  <!-- Terminal inner glow -->
  <rect x="82" y="62" width="816" height="306" fill="url(#cli-glow)"/>

  <!-- Command prompt lines (abstract bars, cascading) -->

  <!-- Line 1: prompt + command (oldest, most faded) -->
  <g opacity="0.25">
    <rect x="110" y="84" width="6" height="2" rx="1" fill="#4a7a9b"/>
    <rect x="120" y="84" width="3" height="2" rx="1" fill="#d4952e"/>
    <rect x="130" y="84" width="140" height="2" rx="1" fill="#2a2a3e"/>
  </g>
  <!-- Output bars for line 1 -->
  <g opacity="0.2">
    <rect x="120" y="94" width="260" height="2" rx="1" fill="#2a2a3e"/>
    <rect x="120" y="102" width="180" height="2" rx="1" fill="#2a2a3e"/>
    <rect x="120" y="110" width="220" height="2" rx="1" fill="#1a1a2e"/>
  </g>

  <!-- Line 2: prompt + command -->
  <g opacity="0.35">
    <rect x="110" y="130" width="6" height="2" rx="1" fill="#4a7a9b"/>
    <rect x="120" y="130" width="3" height="2" rx="1" fill="#d4952e"/>
    <rect x="130" y="130" width="100" height="2" rx="1" fill="#2a2a3e"/>
  </g>
  <!-- Output bars for line 2 -->
  <g opacity="0.3">
    <rect x="120" y="140" width="320" height="2" rx="1" fill="#2a2a3e"/>
    <rect x="120" y="148" width="240" height="2" rx="1" fill="#2a2a3e"/>
    <rect x="120" y="156" width="280" height="2" rx="1" fill="#d4952e" opacity="0.3"/>
    <rect x="120" y="164" width="160" height="2" rx="1" fill="#2a2a3e"/>
  </g>

  <!-- Line 3: prompt + command -->
  <g opacity="0.5">
    <rect x="110" y="186" width="6" height="2" rx="1" fill="#4a7a9b"/>
    <rect x="120" y="186" width="3" height="2" rx="1" fill="#d4952e"/>
    <rect x="130" y="186" width="180" height="2" rx="1" fill="#2a2a3e"/>
  </g>
  <!-- Output bars for line 3 -->
  <g opacity="0.45">
    <rect x="120" y="196" width="380" height="2" rx="1" fill="#2a2a3e"/>
    <rect x="120" y="204" width="200" height="2" rx="1" fill="#2a2a3e"/>
    <rect x="120" y="212" width="340" height="2" rx="1" fill="#2a2a3e"/>
    <rect x="120" y="220" width="150" height="2" rx="1" fill="#4a7a9b" opacity="0.4"/>
    <rect x="120" y="228" width="290" height="2" rx="1" fill="#2a2a3e"/>
  </g>

  <!-- Line 4: active prompt (brightest) -->
  <g opacity="0.8">
    <rect x="110" y="254" width="6" height="2" rx="1" fill="#4a7a9b"/>
    <rect x="120" y="254" width="3" height="2" rx="1" fill="#d4952e"/>
    <rect x="130" y="254" width="220" height="2" rx="1" fill="#2a2a3e"/>
  </g>
  <!-- Active output streaming in -->
  <g opacity="0.65">
    <rect x="120" y="264" width="420" height="2" rx="1" fill="#2a2a3e"/>
    <rect x="120" y="272" width="300" height="2" rx="1" fill="#d4952e" opacity="0.4"/>
    <rect x="120" y="280" width="360" height="2" rx="1" fill="#2a2a3e"/>
    <rect x="120" y="288" width="240" height="2" rx="1" fill="#2a2a3e"/>
  </g>

  <!-- Current input line with cursor -->
  <g opacity="0.9">
    <rect x="110" y="310" width="6" height="2" rx="1" fill="#4a7a9b"/>
    <rect x="120" y="310" width="3" height="2" rx="1" fill="#d4952e"/>
    <rect x="130" y="310" width="80" height="2" rx="1" fill="#4a7a9b" opacity="0.6"/>
  </g>

  <!-- Blinking cursor -->
  <rect x="216" y="306" width="8" height="12" rx="1" fill="#d4952e" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Cursor glow -->
  <circle cx="220" cy="312" r="16" fill="url(#cli-cursor-glow)">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Cascading light effect (scan line moving down) -->
  <rect x="82" y="80" width="816" height="1" fill="#d4952e" opacity="0.03">
    <animate attributeName="y" values="62;368;62" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.03;0.06;0.03" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Divider between terminal and side panel -->
  <rect x="930" y="30" width="1" height="340" fill="#1a1a2e"/>

  <!-- Side panel -->
  <rect x="931" y="30" width="220" height="340" rx="0" fill="#0d0d12" stroke="#1a1a2e" stroke-width="0" opacity="0.8"/>
  <rect x="931" y="30" width="220" height="32" fill="#1a1a2e"/>
  <!-- Side panel title bar right edge rounding -->
  <rect x="1143" y="30" width="8" height="32" rx="8" fill="#1a1a2e"/>
  <rect x="1143" y="30" width="4" height="32" fill="#1a1a2e"/>
  <!-- Bottom right corner -->
  <rect x="1143" y="362" width="8" height="8" rx="8" fill="#0d0d12"/>

  <!-- Side panel ambient -->
  <rect x="931" y="62" width="220" height="308" fill="url(#cli-side-glow)"/>

  <!-- Side panel: status section -->
  <text x="952" cy="86" y="86" font-family="monospace" font-size="9" fill="#4a7a9b" opacity="0.6">STATUS</text>
  <rect x="952" y="94" width="180" height="1" fill="#1a1a2e"/>

  <!-- Status indicators -->
  <!-- Row 1: active (green) -->
  <circle cx="962" cy="114" r="3.5" fill="#2a6e3a" opacity="0.9"/>
  <circle cx="962" cy="114" r="2" fill="#3daa55" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <rect x="974" y="113" width="60" height="2" rx="1" fill="#2a2a3e" opacity="0.5"/>

  <!-- Row 2: active (green) -->
  <circle cx="962" cy="134" r="3.5" fill="#2a6e3a" opacity="0.9"/>
  <circle cx="962" cy="134" r="2" fill="#3daa55" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.4;0.7" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <rect x="974" y="133" width="80" height="2" rx="1" fill="#2a2a3e" opacity="0.5"/>

  <!-- Row 3: amber (warning) -->
  <circle cx="962" cy="154" r="3.5" fill="#6e5a2a" opacity="0.9"/>
  <circle cx="962" cy="154" r="2" fill="#d4952e" opacity="0.7">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <rect x="974" y="153" width="50" height="2" rx="1" fill="#2a2a3e" opacity="0.5"/>

  <!-- Row 4: active (green) -->
  <circle cx="962" cy="174" r="3.5" fill="#2a6e3a" opacity="0.9"/>
  <circle cx="962" cy="174" r="2" fill="#3daa55" opacity="0.6"/>
  <rect x="974" y="173" width="70" height="2" rx="1" fill="#2a2a3e" opacity="0.5"/>

  <!-- Row 5: active (green) -->
  <circle cx="962" cy="194" r="3.5" fill="#2a6e3a" opacity="0.9"/>
  <circle cx="962" cy="194" r="2" fill="#3daa55" opacity="0.6"/>
  <rect x="974" y="193" width="55" height="2" rx="1" fill="#2a2a3e" opacity="0.5"/>

  <!-- Row 6: amber -->
  <circle cx="962" cy="214" r="3.5" fill="#6e5a2a" opacity="0.9"/>
  <circle cx="962" cy="214" r="2" fill="#d4952e" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <rect x="974" y="213" width="65" height="2" rx="1" fill="#2a2a3e" opacity="0.5"/>

  <!-- Separator -->
  <rect x="952" y="236" width="180" height="1" fill="#1a1a2e"/>
  <text x="952" y="254" font-family="monospace" font-size="9" fill="#4a7a9b" opacity="0.6">AGENTS</text>

  <!-- Agent mini bars -->
  <rect x="952" y="268" width="40" height="4" rx="2" fill="#4a7a9b" opacity="0.3"/>
  <rect x="952" y="280" width="55" height="4" rx="2" fill="#d4952e" opacity="0.25"/>
  <rect x="952" y="292" width="35" height="4" rx="2" fill="#4a7a9b" opacity="0.2"/>
  <rect x="952" y="304" width="48" height="4" rx="2" fill="#4a7a9b" opacity="0.15"/>
  <rect x="952" y="316" width="30" height="4" rx="2" fill="#d4952e" opacity="0.2"/>

  <!-- Bottom label -->
  <text x="600" y="392" font-family="monospace" font-size="10" fill="#4a7a9b" opacity="0.4" text-anchor="middle">CLI INTERFACE</text>
</svg>