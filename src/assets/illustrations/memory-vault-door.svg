<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <!-- Ambient glow behind vault -->
    <radialGradient id="vaultAmbient" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#d4952e" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
    <!-- Light leak from crack -->
    <radialGradient id="lightLeak" cx="52%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#d4952e" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
    <!-- Keyhole glow -->
    <radialGradient id="keyholeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a7a9b" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#4a7a9b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4a7a9b" stop-opacity="0"/>
    </radialGradient>
    <!-- Memory shard glow -->
    <radialGradient id="shardGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#d4952e" stop-opacity="0"/>
    </radialGradient>
    <!-- Floor reflection gradient -->
    <linearGradient id="floorReflect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </linearGradient>
    <!-- Vault door surface -->
    <radialGradient id="vaultSurface" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#2a2a3e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>
    <!-- Door ajar surface (inner edge visible) -->
    <linearGradient id="doorEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2a2a3e"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="400" fill="#0a0a0c"/>

  <!-- Ambient light from vault interior -->
  <rect width="1200" height="400" fill="url(#vaultAmbient)"/>

  <!-- Floor line -->
  <line x1="200" y1="340" x2="1000" y2="340" stroke="#1a1a2e" stroke-width="1"/>

  <!-- Floor reflection -->
  <ellipse cx="600" cy="370" rx="280" ry="30" fill="url(#floorReflect)"/>

  <!-- Vault frame (arch shape) -->
  <path d="M 380 340 L 380 140 Q 380 60 600 60 Q 820 60 820 140 L 820 340 Z"
        fill="none" stroke="#2a2a3e" stroke-width="4"/>
  <path d="M 390 340 L 390 145 Q 390 75 600 75 Q 810 75 810 145 L 810 340 Z"
        fill="none" stroke="#1a1a2e" stroke-width="2"/>

  <!-- Interior darkness -->
  <path d="M 395 335 L 395 148 Q 395 80 600 80 Q 805 80 805 148 L 805 335 Z"
        fill="#050508"/>

  <!-- Light leak through crack -->
  <ellipse cx="630" cy="200" rx="200" ry="160" fill="url(#lightLeak)"/>

  <!-- Light beam rays from crack -->
  <g opacity="0.12">
    <polygon points="620,100 660,50 625,100" fill="#d4952e"/>
    <polygon points="625,120 700,30 630,120" fill="#d4952e"/>
    <polygon points="620,280 650,350 625,280" fill="#d4952e"/>
    <polygon points="622,240 680,340 628,240" fill="#d4952e"/>
  </g>

  <!-- Memory shards floating inside vault -->
  <g>
    <!-- Shard 1 -->
    <rect x="500" y="140" width="12" height="20" rx="2" fill="#d4952e" opacity="0.7" transform="rotate(-15 506 150)">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="3s" repeatCount="indefinite"/>
    </rect>
    <!-- Shard 2 -->
    <rect x="550" y="180" width="8" height="14" rx="1" fill="#d4952e" opacity="0.5" transform="rotate(10 554 187)">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite"/>
    </rect>
    <!-- Shard 3 -->
    <rect x="480" y="220" width="10" height="16" rx="2" fill="#d4952e" opacity="0.6" transform="rotate(-8 485 228)"/>
    <!-- Shard 4 -->
    <rect x="530" y="260" width="6" height="12" rx="1" fill="#d4952e" opacity="0.4" transform="rotate(20 533 266)"/>
    <!-- Shard 5 -->
    <rect x="570" y="150" width="9" height="15" rx="1" fill="#d4952e" opacity="0.55" transform="rotate(-5 574 157)"/>
    <!-- Shard 6 -->
    <rect x="510" y="290" width="7" height="11" rx="1" fill="#d4952e" opacity="0.35" transform="rotate(12 513 295)"/>
    <!-- Shard 7 -->
    <rect x="460" y="170" width="11" height="18" rx="2" fill="#d4952e" opacity="0.45" transform="rotate(-22 465 179)">
      <animate attributeName="opacity" values="0.45;0.75;0.45" dur="5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Vault door (circular, slightly ajar — shifted right to show gap) -->
  <g transform="translate(20, 0)">
    <!-- Door circle -->
    <ellipse cx="620" cy="200" rx="185" ry="135" fill="url(#vaultSurface)" stroke="#2a2a3e" stroke-width="3"/>

    <!-- Door rim detail rings -->
    <ellipse cx="620" cy="200" rx="170" ry="124" fill="none" stroke="#2a2a3e" stroke-width="1" opacity="0.5"/>
    <ellipse cx="620" cy="200" rx="155" ry="113" fill="none" stroke="#1a1a2e" stroke-width="1" opacity="0.3"/>

    <!-- Vault handle (wheel spokes) -->
    <g stroke="#2a2a3e" stroke-width="2.5" opacity="0.6">
      <line x1="620" y1="155" x2="620" y2="245"/>
      <line x1="575" y1="177" x2="665" y2="223"/>
      <line x1="575" y1="223" x2="665" y2="177"/>
    </g>
    <!-- Handle hub -->
    <circle cx="620" cy="200" r="12" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="2"/>

    <!-- Locking bolts -->
    <circle cx="620" cy="100" r="6" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1.5"/>
    <circle cx="620" cy="300" r="6" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1.5"/>
    <circle cx="480" cy="200" r="6" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1.5"/>
    <circle cx="760" cy="200" r="6" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1.5"/>

    <!-- Keyhole -->
    <g transform="translate(620, 200)">
      <circle r="22" fill="url(#keyholeGlow)"/>
      <!-- Keyhole shape -->
      <circle cy="-4" r="5" fill="#0a0a0c"/>
      <rect x="-3" y="-2" width="6" height="14" rx="1" fill="#0a0a0c"/>
      <!-- Keyhole inner glow -->
      <circle cy="-4" r="3" fill="#4a7a9b" opacity="0.6"/>
      <rect x="-1.5" y="0" width="3" height="10" rx="0.5" fill="#4a7a9b" opacity="0.3"/>
    </g>
  </g>

  <!-- Door edge (visible through the crack on the left side) -->
  <rect x="415" y="82" width="12" height="256" fill="url(#doorEdge)" rx="1" opacity="0.4"/>

  <!-- Additional light leak streaks -->
  <g opacity="0.06">
    <rect x="410" y="120" width="400" height="1" fill="#d4952e" transform="rotate(-3 610 120)"/>
    <rect x="410" y="200" width="350" height="1" fill="#d4952e"/>
    <rect x="410" y="270" width="380" height="1" fill="#d4952e" transform="rotate(2 600 270)"/>
  </g>

  <!-- Decorative corner elements -->
  <g stroke="#1a1a2e" stroke-width="1" fill="none" opacity="0.3">
    <!-- Top left -->
    <path d="M 50 50 L 50 20 L 80 20"/>
    <path d="M 55 55 L 55 28 L 82 28"/>
    <!-- Top right -->
    <path d="M 1150 50 L 1150 20 L 1120 20"/>
    <path d="M 1145 55 L 1145 28 L 1118 28"/>
    <!-- Bottom left -->
    <path d="M 50 350 L 50 380 L 80 380"/>
    <path d="M 55 345 L 55 372 L 82 372"/>
    <!-- Bottom right -->
    <path d="M 1150 350 L 1150 380 L 1120 380"/>
    <path d="M 1145 345 L 1145 372 L 1118 372"/>
  </g>
</svg>