<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="mBg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0d0a08"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </linearGradient>
    <radialGradient id="mGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#mBg)"/>
  <rect width="1200" height="400" fill="url(#mGlow)"/>
  <!-- Ledger lines -->
  <g opacity="0.15" stroke="#d4952e" stroke-width="0.5">
    <line x1="100" y1="100" x2="1100" y2="100"/>
    <line x1="100" y1="140" x2="1100" y2="140"/>
    <line x1="100" y1="180" x2="1100" y2="180"/>
    <line x1="100" y1="220" x2="1100" y2="220"/>
    <line x1="100" y1="260" x2="1100" y2="260"/>
    <line x1="100" y1="300" x2="1100" y2="300"/>
  </g>
  <!-- Bar chart -->
  <g opacity="0.25">
    <rect x="200" y="200" width="40" height="100" rx="2" fill="#d4952e"/>
    <rect x="280" y="160" width="40" height="140" rx="2" fill="#d4952e"/>
    <rect x="360" y="220" width="40" height="80" rx="2" fill="#d4952e"/>
    <rect x="440" y="140" width="40" height="160" rx="2" fill="#d4952e"/>
    <rect x="520" y="180" width="40" height="120" rx="2" fill="#d4952e"/>
    <rect x="600" y="240" width="40" height="60" rx="2" fill="#6e6e73"/>
    <rect x="680" y="190" width="40" height="110" rx="2" fill="#d4952e"/>
  </g>
  <!-- Cost labels -->
  <text x="600" y="370" text-anchor="middle" fill="#424245" font-family="monospace" font-size="11" letter-spacing="3">API COSTS • ELECTRICITY • HARDWARE AMORT</text>
  <!-- ROI indicator -->
  <g opacity="0.3">
    <rect x="850" y="120" width="250" height="80" rx="8" fill="none" stroke="#d4952e" stroke-width="1"/>
    <text x="975" y="155" text-anchor="middle" fill="#d4952e" font-family="monospace" font-size="13">MONTHLY ROI</text>
    <text x="975" y="180" text-anchor="middle" fill="#6e6e73" font-family="monospace" font-size="10">hobby ≠ investment</text>
  </g>
</svg>
