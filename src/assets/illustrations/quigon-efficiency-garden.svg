<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <radialGradient id="quigon-bg" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#0a1a15" stop-opacity="1"/>
      <stop offset="60%" stop-color="#060f0a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#030805" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="quigon-green" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#40ff80" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#40ff80" stop-opacity="0"/>
    </radialGradient>
    <filter id="quigon-glow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <linearGradient id="quigon-sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a10" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a0a05" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#quigon-bg)"/>

  <!-- Zen garden sand (raked lines) -->
  <g opacity="0.12" stroke="#3a5a40" stroke-width="0.5" fill="none">
    <path d="M0,320 Q300,310 600,320 Q900,330 1200,320"/>
    <path d="M0,330 Q300,320 600,330 Q900,340 1200,330"/>
    <path d="M0,340 Q300,330 600,340 Q900,350 1200,340"/>
    <path d="M0,350 Q300,340 600,350 Q900,360 1200,350"/>
    <path d="M0,360 Q300,350 600,360 Q900,370 1200,360"/>
    <path d="M0,370 Q300,360 600,370 Q900,380 1200,370"/>
    <path d="M0,380 Q300,370 600,380 Q900,390 1200,380"/>
    <!-- Circular rakes around rocks -->
    <ellipse cx="200" cy="310" rx="50" ry="15"/>
    <ellipse cx="200" cy="310" rx="60" ry="20"/>
    <ellipse cx="900" cy="320" rx="45" ry="12"/>
    <ellipse cx="900" cy="320" rx="55" ry="17"/>
  </g>

  <!-- Server-rack rocks (left cluster) -->
  <g>
    <!-- Rock 1 - tall rack -->
    <rect x="170" y="240" width="28" height="70" rx="2" fill="#0d1a12" stroke="#1a3020" stroke-width="0.8"/>
    <rect x="174" y="248" width="20" height="4" rx="1" fill="#0a3a1a" opacity="0.5"/>
    <rect x="174" y="256" width="20" height="4" rx="1" fill="#0a3a1a" opacity="0.4"/>
    <rect x="174" y="264" width="20" height="4" rx="1" fill="#0a3a1a" opacity="0.3"/>
    <rect x="174" y="272" width="20" height="4" rx="1" fill="#40ff80" opacity="0.15"/>
    <circle cx="177" cy="250" r="1" fill="#40ff80" opacity="0.6"/>

    <!-- Rock 2 - medium rack -->
    <rect x="205" y="260" width="24" height="50" rx="2" fill="#0d1a12" stroke="#1a3020" stroke-width="0.8"/>
    <rect x="209" y="268" width="16" height="3" rx="1" fill="#0a3a1a" opacity="0.4"/>
    <rect x="209" y="275" width="16" height="3" rx="1" fill="#0a3a1a" opacity="0.3"/>
    <circle cx="212" cy="270" r="1" fill="#40ff80" opacity="0.5"/>

    <!-- Rock 3 - small -->
    <rect x="155" y="275" width="18" height="35" rx="2" fill="#0d1a12" stroke="#1a3020" stroke-width="0.8"/>
    <rect x="159" y="282" width="10" height="3" rx="1" fill="#0a3a1a" opacity="0.3"/>
  </g>

  <!-- Server-rack rocks (right cluster) -->
  <g>
    <rect x="880" y="250" width="30" height="65" rx="2" fill="#0d1a12" stroke="#1a3020" stroke-width="0.8"/>
    <rect x="884" y="258" width="22" height="4" rx="1" fill="#0a3a1a" opacity="0.5"/>
    <rect x="884" y="266" width="22" height="4" rx="1" fill="#0a3a1a" opacity="0.4"/>
    <rect x="884" y="274" width="22" height="4" rx="1" fill="#40ff80" opacity="0.15"/>
    <circle cx="887" cy="260" r="1" fill="#40ff80" opacity="0.6"/>

    <rect x="918" y="265" width="22" height="45" rx="2" fill="#0d1a12" stroke="#1a3020" stroke-width="0.8"/>
    <rect x="922" y="273" width="14" height="3" rx="1" fill="#0a3a1a" opacity="0.4"/>
  </g>

  <!-- Central figure (contemplating efficiency) -->
  <g transform="translate(600, 190)">
    <ellipse cx="0" cy="80" rx="25" ry="8" fill="#0a1a10" opacity="0.5"/>
    <!-- Robed figure standing -->
    <path d="M-15,75 Q-18,30 -12,-10 Q-8,-25 0,-35 Q8,-25 12,-10 Q18,30 15,75 Z" fill="#0a1510" stroke="#1a3020" stroke-width="0.5"/>
    <!-- Head -->
    <circle cx="0" cy="-42" r="10" fill="#0a1510" stroke="#1a3020" stroke-width="0.5"/>
    <!-- Staff -->
    <line x1="18" y1="70" x2="22" y2="-30" stroke="#2a4030" stroke-width="2"/>
    <circle cx="22" cy="-33" r="4" fill="none" stroke="#40ff80" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Floating efficiency charts -->
  <g opacity="0.4" filter="url(#quigon-glow)">
    <!-- Left chart -->
    <g transform="translate(400, 100)">
      <rect x="0" y="0" width="100" height="70" rx="3" fill="none" stroke="#40ff80" stroke-width="0.8" opacity="0.5"/>
      <!-- Bar chart -->
      <rect x="10" y="50" width="8" height="15" fill="#40ff80" opacity="0.3"/>
      <rect x="22" y="35" width="8" height="30" fill="#40ff80" opacity="0.4"/>
      <rect x="34" y="25" width="8" height="40" fill="#40ff80" opacity="0.5"/>
      <rect x="46" y="15" width="8" height="50" fill="#40ff80" opacity="0.6"/>
      <rect x="58" y="10" width="8" height="55" fill="#40ff80" opacity="0.7"/>
      <rect x="70" y="5" width="8" height="60" fill="#40ff80" opacity="0.5"/>
      <!-- Arrow up -->
      <polygon points="85,8 82,15 88,15" fill="#40ff80" opacity="0.6"/>
      <line x1="85" y1="15" x2="85" y2="30" stroke="#40ff80" stroke-width="1" opacity="0.4"/>
    </g>

    <!-- Right chart -->
    <g transform="translate(700, 110)">
      <rect x="0" y="0" width="100" height="60" rx="3" fill="none" stroke="#40ff80" stroke-width="0.8" opacity="0.4"/>
      <!-- Line graph -->
      <polyline points="10,45 25,40 40,30 55,25 70,15 85,10" fill="none" stroke="#40ff80" stroke-width="1.5" opacity="0.6"/>
      <!-- Dots -->
      <circle cx="10" cy="45" r="2" fill="#40ff80" opacity="0.5"/>
      <circle cx="40" cy="30" r="2" fill="#40ff80" opacity="0.5"/>
      <circle cx="70" cy="15" r="2" fill="#40ff80" opacity="0.5"/>
      <circle cx="85" cy="10" r="2" fill="#40ff80" opacity="0.7"/>
    </g>
  </g>

  <!-- Energy optimization symbol (center top) -->
  <g transform="translate(600, 50)" opacity="0.3">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#40ff80" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#40ff80" stroke-width="0.5"/>
    <!-- Leaf/efficiency symbol -->
    <path d="M0,-8 Q8,0 0,10 Q-8,0 0,-8" fill="#40ff80" opacity="0.2" stroke="#40ff80" stroke-width="0.5"/>
  </g>

  <!-- Bamboo/minimal plant elements -->
  <g opacity="0.2" stroke="#2a5030" stroke-width="1.5">
    <line x1="50" y1="400" x2="50" y2="150"/>
    <line x1="55" y1="200" x2="75" y2="180"/>
    <line x1="55" y1="250" x2="30" y2="230"/>
    <line x1="1150" y1="400" x2="1150" y2="170"/>
    <line x1="1145" y1="220" x2="1125" y2="200"/>
    <line x1="1145" y1="270" x2="1170" y2="250"/>
  </g>

  <!-- Subtle particles -->
  <g opacity="0.3">
    <circle cx="300" cy="180" r="1" fill="#40ff80"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="250" r="0.8" fill="#40ff80"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="750" cy="200" r="1" fill="#40ff80"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="150" r="0.8" fill="#40ff80"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
  </g>
</svg>