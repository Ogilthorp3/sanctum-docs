<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <!-- Central node amber glow -->
    <radialGradient id="centralGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#d4952e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4952e" stop-opacity="0"/>
    </radialGradient>
    <!-- Medium amber node -->
    <radialGradient id="amberNode" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#d4952e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4952e" stop-opacity="0"/>
    </radialGradient>
    <!-- Blue node glow -->
    <radialGradient id="blueNode" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a7a9b" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#4a7a9b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4a7a9b" stop-opacity="0"/>
    </radialGradient>
    <!-- Ambient background glow -->
    <radialGradient id="bgGlow" cx="50%" cy="48%" r="40%">
      <stop offset="0%" stop-color="#d4952e" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="400" fill="#0a0a0c"/>

  <!-- Star field (tiny dots at 5% opacity) -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="45" cy="23" r="0.8"/>
    <circle cx="120" cy="67" r="0.6"/>
    <circle cx="198" cy="12" r="0.7"/>
    <circle cx="255" cy="89" r="0.5"/>
    <circle cx="340" cy="35" r="0.8"/>
    <circle cx="412" cy="78" r="0.6"/>
    <circle cx="478" cy="15" r="0.7"/>
    <circle cx="560" cy="52" r="0.5"/>
    <circle cx="635" cy="28" r="0.8"/>
    <circle cx="720" cy="65" r="0.6"/>
    <circle cx="790" cy="18" r="0.7"/>
    <circle cx="870" cy="42" r="0.5"/>
    <circle cx="945" cy="72" r="0.8"/>
    <circle cx="1020" cy="25" r="0.6"/>
    <circle cx="1095" cy="58" r="0.7"/>
    <circle cx="1155" cy="33" r="0.5"/>
    <circle cx="78" cy="145" r="0.6"/>
    <circle cx="155" cy="310" r="0.7"/>
    <circle cx="230" cy="178" r="0.5"/>
    <circle cx="310" cy="355" r="0.8"/>
    <circle cx="385" cy="290" r="0.6"/>
    <circle cx="465" cy="365" r="0.7"/>
    <circle cx="540" cy="310" r="0.5"/>
    <circle cx="615" cy="375" r="0.8"/>
    <circle cx="700" cy="345" r="0.6"/>
    <circle cx="775" cy="380" r="0.7"/>
    <circle cx="850" cy="320" r="0.5"/>
    <circle cx="930" cy="365" r="0.8"/>
    <circle cx="1010" cy="340" r="0.6"/>
    <circle cx="1080" cy="375" r="0.7"/>
    <circle cx="1150" cy="310" r="0.5"/>
    <circle cx="60" cy="240" r="0.7"/>
    <circle cx="140" cy="200" r="0.5"/>
    <circle cx="1060" cy="180" r="0.6"/>
    <circle cx="1140" cy="220" r="0.8"/>
    <circle cx="95" cy="370" r="0.6"/>
    <circle cx="1115" cy="130" r="0.5"/>
    <circle cx="30" cy="300" r="0.7"/>
    <circle cx="1170" cy="280" r="0.6"/>
    <circle cx="500" cy="120" r="0.5"/>
    <circle cx="680" cy="100" r="0.7"/>
  </g>

  <!-- Ambient glow -->
  <rect width="1200" height="400" fill="url(#bgGlow)"/>

  <!-- === CONNECTION LINES === -->
  <!-- Node positions:
    Central: 600, 195
    N1: 420, 140   (amber, medium)
    N2: 780, 150   (amber, medium)
    N3: 500, 280   (blue, small)
    N4: 700, 290   (blue, small)
    N5: 340, 240   (blue, small)
    N6: 860, 230   (blue, small)
    N7: 550, 100   (blue, tiny)
    N8: 650, 105   (blue, tiny)
    N9: 460, 195   (amber, small)
    N10: 740, 200  (amber, small)
    N11: 300, 140  (blue, tiny)
    N12: 900, 155  (blue, tiny)
  -->
  <g stroke-linecap="round">
    <!-- Central to major nodes -->
    <line x1="600" y1="195" x2="420" y2="140" stroke="#d4952e" stroke-width="1" opacity="0.2"/>
    <line x1="600" y1="195" x2="780" y2="150" stroke="#d4952e" stroke-width="1" opacity="0.2"/>
    <line x1="600" y1="195" x2="500" y2="280" stroke="#4a7a9b" stroke-width="0.8" opacity="0.15"/>
    <line x1="600" y1="195" x2="700" y2="290" stroke="#4a7a9b" stroke-width="0.8" opacity="0.15"/>
    <line x1="600" y1="195" x2="460" y2="195" stroke="#d4952e" stroke-width="0.8" opacity="0.18"/>
    <line x1="600" y1="195" x2="740" y2="200" stroke="#d4952e" stroke-width="0.8" opacity="0.18"/>
    <line x1="600" y1="195" x2="550" y2="100" stroke="#4a7a9b" stroke-width="0.6" opacity="0.12"/>
    <line x1="600" y1="195" x2="650" y2="105" stroke="#4a7a9b" stroke-width="0.6" opacity="0.12"/>

    <!-- Inter-node connections -->
    <line x1="420" y1="140" x2="340" y2="240" stroke="#4a7a9b" stroke-width="0.6" opacity="0.1"/>
    <line x1="420" y1="140" x2="460" y2="195" stroke="#d4952e" stroke-width="0.6" opacity="0.12"/>
    <line x1="420" y1="140" x2="550" y2="100" stroke="#4a7a9b" stroke-width="0.5" opacity="0.1"/>
    <line x1="420" y1="140" x2="300" y2="140" stroke="#4a7a9b" stroke-width="0.5" opacity="0.08"/>
    <line x1="780" y1="150" x2="860" y2="230" stroke="#4a7a9b" stroke-width="0.6" opacity="0.1"/>
    <line x1="780" y1="150" x2="740" y2="200" stroke="#d4952e" stroke-width="0.6" opacity="0.12"/>
    <line x1="780" y1="150" x2="650" y2="105" stroke="#4a7a9b" stroke-width="0.5" opacity="0.1"/>
    <line x1="780" y1="150" x2="900" y2="155" stroke="#4a7a9b" stroke-width="0.5" opacity="0.08"/>
    <line x1="500" y1="280" x2="340" y2="240" stroke="#4a7a9b" stroke-width="0.5" opacity="0.08"/>
    <line x1="500" y1="280" x2="700" y2="290" stroke="#4a7a9b" stroke-width="0.5" opacity="0.08">
      <animate attributeName="opacity" values="0.08;0.16;0.08" dur="6s" repeatCount="indefinite"/>
    </line>
    <line x1="700" y1="290" x2="860" y2="230" stroke="#4a7a9b" stroke-width="0.5" opacity="0.08"/>
    <line x1="550" y1="100" x2="650" y2="105" stroke="#4a7a9b" stroke-width="0.5" opacity="0.1"/>
    <line x1="460" y1="195" x2="500" y2="280" stroke="#4a7a9b" stroke-width="0.5" opacity="0.08"/>
    <line x1="740" y1="200" x2="700" y2="290" stroke="#4a7a9b" stroke-width="0.5" opacity="0.08"/>
  </g>

  <!-- === NODES === -->

  <!-- Central node (largest, amber) -->
  <circle cx="600" cy="195" r="35" fill="url(#centralGlow)"/>
  <circle cx="600" cy="195" r="10" fill="#d4952e" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.5;0.8" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="195" r="5" fill="#d4952e" opacity="0.95"/>

  <!-- N1: 420, 140 (amber, medium) -->
  <circle cx="420" cy="140" r="22" fill="url(#amberNode)"/>
  <circle cx="420" cy="140" r="6" fill="#d4952e" opacity="0.7"/>
  <circle cx="420" cy="140" r="3" fill="#d4952e" opacity="0.9"/>

  <!-- N2: 780, 150 (amber, medium) -->
  <circle cx="780" cy="150" r="22" fill="url(#amberNode)"/>
  <circle cx="780" cy="150" r="6" fill="#d4952e" opacity="0.7"/>
  <circle cx="780" cy="150" r="3" fill="#d4952e" opacity="0.9"/>

  <!-- N9: 460, 195 (amber, small) -->
  <circle cx="460" cy="195" r="16" fill="url(#amberNode)"/>
  <circle cx="460" cy="195" r="4.5" fill="#d4952e" opacity="0.6"/>
  <circle cx="460" cy="195" r="2" fill="#d4952e" opacity="0.85"/>

  <!-- N10: 740, 200 (amber, small) -->
  <circle cx="740" cy="200" r="16" fill="url(#amberNode)"/>
  <circle cx="740" cy="200" r="4.5" fill="#d4952e" opacity="0.6"/>
  <circle cx="740" cy="200" r="2" fill="#d4952e" opacity="0.85"/>

  <!-- N3: 500, 280 (blue, small) -->
  <circle cx="500" cy="280" r="18" fill="url(#blueNode)"/>
  <circle cx="500" cy="280" r="5" fill="#4a7a9b" opacity="0.65"/>
  <circle cx="500" cy="280" r="2.5" fill="#4a7a9b" opacity="0.9"/>

  <!-- N4: 700, 290 (blue, small) -->
  <circle cx="700" cy="290" r="18" fill="url(#blueNode)"/>
  <circle cx="700" cy="290" r="5" fill="#4a7a9b" opacity="0.65"/>
  <circle cx="700" cy="290" r="2.5" fill="#4a7a9b" opacity="0.9"/>

  <!-- N5: 340, 240 (blue, small) -->
  <circle cx="340" cy="240" r="15" fill="url(#blueNode)"/>
  <circle cx="340" cy="240" r="4" fill="#4a7a9b" opacity="0.6"/>
  <circle cx="340" cy="240" r="2" fill="#4a7a9b" opacity="0.85"/>

  <!-- N6: 860, 230 (blue, small) -->
  <circle cx="860" cy="230" r="15" fill="url(#blueNode)"/>
  <circle cx="860" cy="230" r="4" fill="#4a7a9b" opacity="0.6"/>
  <circle cx="860" cy="230" r="2" fill="#4a7a9b" opacity="0.85"/>

  <!-- N7: 550, 100 (blue, tiny) -->
  <circle cx="550" cy="100" r="12" fill="url(#blueNode)"/>
  <circle cx="550" cy="100" r="3" fill="#4a7a9b" opacity="0.55">
    <animate attributeName="opacity" values="0.55;0.3;0.55" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="100" r="1.5" fill="#4a7a9b" opacity="0.8"/>

  <!-- N8: 650, 105 (blue, tiny) -->
  <circle cx="650" cy="105" r="12" fill="url(#blueNode)"/>
  <circle cx="650" cy="105" r="3" fill="#4a7a9b" opacity="0.55"/>
  <circle cx="650" cy="105" r="1.5" fill="#4a7a9b" opacity="0.8"/>

  <!-- N11: 300, 140 (blue, tiny) -->
  <circle cx="300" cy="140" r="10" fill="url(#blueNode)"/>
  <circle cx="300" cy="140" r="2.5" fill="#4a7a9b" opacity="0.45"/>
  <circle cx="300" cy="140" r="1.2" fill="#4a7a9b" opacity="0.7"/>

  <!-- N12: 900, 155 (blue, tiny) -->
  <circle cx="900" cy="155" r="10" fill="url(#blueNode)"/>
  <circle cx="900" cy="155" r="2.5" fill="#4a7a9b" opacity="0.45"/>
  <circle cx="900" cy="155" r="1.2" fill="#4a7a9b" opacity="0.7"/>

  <!-- Decorative corner brackets -->
  <g stroke="#1a1a2e" stroke-width="1" fill="none" opacity="0.25">
    <path d="M 40 40 L 40 20 L 60 20"/>
    <path d="M 1160 40 L 1160 20 L 1140 20"/>
    <path d="M 40 360 L 40 380 L 60 380"/>
    <path d="M 1160 360 L 1160 380 L 1140 380"/>
  </g>
</svg>