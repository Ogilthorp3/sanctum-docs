<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 950" width="1200" height="950" role="img" aria-label="Sanctum services catalog organized by category — Core, AI, Network, System, and VM services with Deadpool-themed ports">
  <defs>
    <filter id="svc-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&amp;display=swap');

    .comic { font-family: 'Bangers', 'Impact', 'Arial Black', cursive; letter-spacing: 2px; }
    .mono { font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace; font-weight: 700; }

    .h-xl { font-size: 24px; fill: #d4952e; }
    .h-lg { font-size: 20px; fill: currentColor; }
    .h-md { font-size: 17px; fill: currentColor; }
    .label { font-size: 14px; fill: currentColor; opacity: 0.9; }
    .label-sm { font-size: 12px; fill: currentColor; opacity: 0.7; }
    .port { font-size: 13px; fill: #d4952e; font-weight: 800; }
    .subtitle { font-size: 12px; fill: currentColor; opacity: 0.5; font-weight: 600; }
    .section-head { font-size: 11px; fill: currentColor; opacity: 0.45; font-weight: 800; letter-spacing: 3px; }

    .box { fill: none; stroke: currentColor; stroke-width: 2; opacity: 0.3; }
    .box-hero { fill: none; stroke: #d4952e; stroke-width: 3; opacity: 0.7; }
    .box-header { fill: #d4952e; opacity: 0.1; }
    .divider { stroke: currentColor; stroke-width: 1; opacity: 0.12; }

    .dot-amber { fill: #d4952e; }
    .dot-purple { fill: #bf5af2; }
    .dot-green { fill: #30d158; }
    .dot-blue { fill: #64d2ff; }
    .dot-orange { fill: #ff9f0a; }
    .dot-red { fill: #ff453a; }

    .svc-row { font-size: 13px; fill: currentColor; opacity: 0.85; }
    .svc-desc { font-size: 11px; fill: currentColor; opacity: 0.45; }
  </style>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="950" fill="white"/>

  <!-- ==================== TITLE ==================== -->
  <text x="600" y="38" text-anchor="middle" class="comic h-xl">SANCTUM SERVICES CATALOG</text>
  <text x="600" y="58" text-anchor="middle" class="mono subtitle">every service · every port · organized by category</text>

  <!-- ==================== CORE SERVICES (TOP LEFT) ==================== -->
  <g transform="translate(310, 85)">
    <rect x="-270" y="0" width="540" height="240" rx="10" class="box-hero"/>
    <rect x="-270" y="0" width="540" height="38" rx="10" class="box-header"/>
    <rect x="-270" y="26" width="540" height="12" class="box-header"/>
    <circle cx="-248" cy="19" r="8" class="dot-amber" opacity="0.6"/>
    <text x="0" y="27" text-anchor="middle" class="comic h-md">CORE SERVICES</text>
    <text x="248" y="26" text-anchor="end" class="mono" style="font-size: 10px; fill: currentColor; opacity: 0.3;">MAC MINI</text>

    <g class="mono" transform="translate(-248, 55)">
      <text x="0" y="0" class="svc-row">DenchClaw Gateway</text>
      <text x="496" y="0" text-anchor="end" class="port">:19001</text>
      <text x="0" y="16" class="svc-desc">agent gateway · Jocasta · agent API</text>

      <text x="0" y="38" class="svc-row">Home Assistant</text>
      <text x="496" y="38" text-anchor="end" class="port">:8123</text>
      <text x="0" y="54" class="svc-desc">home automation hub · Docker · HomeKit :21063</text>

      <text x="0" y="76" class="svc-row">Command Center</text>
      <text x="496" y="76" text-anchor="end" class="port">:3001</text>
      <text x="0" y="92" class="svc-desc">web dashboard · service status · agent activity</text>

      <text x="0" y="114" class="svc-row">Holocron (Dench)</text>
      <text x="496" y="114" text-anchor="end" class="port">:19001</text>
      <text x="0" y="130" class="svc-desc">family chat · LAN-bound · http://holocron/</text>

      <text x="0" y="152" class="svc-row">Dench Proxy</text>
      <text x="496" y="152" text-anchor="end" class="port">:80</text>
      <text x="0" y="168" class="svc-desc">LaunchDaemon (root) · reverse proxy → :19001</text>
    </g>
  </g>

  <!-- ==================== AI SERVICES (TOP RIGHT) ==================== -->
  <g transform="translate(890, 85)">
    <rect x="-270" y="0" width="540" height="240" rx="10" class="box-hero"/>
    <rect x="-270" y="0" width="540" height="38" rx="10" class="box-header"/>
    <rect x="-270" y="26" width="540" height="12" class="box-header"/>
    <circle cx="-248" cy="19" r="8" class="dot-purple" opacity="0.6"/>
    <text x="0" y="27" text-anchor="middle" class="comic h-md">AI SERVICES</text>
    <text x="248" y="26" text-anchor="end" class="mono" style="font-size: 10px; fill: currentColor; opacity: 0.3;">APPLE SILICON</text>

    <g class="mono" transform="translate(-248, 55)">
      <text x="0" y="0" class="svc-row">Council MLX</text>
      <text x="496" y="0" text-anchor="end" class="port">:1337</text>
      <text x="0" y="16" class="svc-desc">Qwen 3.5 27B 4-bit · per-agent LoRA · MLX native</text>

      <text x="0" y="38" class="svc-row">Sanctum Proxy</text>
      <text x="496" y="38" text-anchor="end" class="port">:4040</text>
      <text x="0" y="54" class="svc-desc">4.6MB Rust · 6-layer routing · 17 models · 12 fallbacks</text>

      <text x="0" y="76" class="svc-row">Qwen3-TTS Voice</text>
      <text x="496" y="76" text-anchor="end" class="port">:8008</text>
      <text x="0" y="92" class="svc-desc">Qwen3-TTS · mlx-audio · zero-shot voice cloning</text>

      <text x="0" y="114" class="svc-row">Anthropic Proxy</text>
      <text x="496" y="114" text-anchor="end" class="port">:2001</text>
      <text x="0" y="130" class="svc-desc">Anthropic API proxy</text>

      <text x="0" y="152" class="svc-row">Graffiti</text>
      <text x="496" y="152" text-anchor="end" class="port">:31416</text>
      <text x="0" y="168" class="svc-desc">pi-themed service port</text>
    </g>
  </g>

  <!-- ==================== NETWORK SERVICES (MIDDLE LEFT) ==================== -->
  <g transform="translate(310, 355)">
    <rect x="-270" y="0" width="540" height="240" rx="10" class="box"/>
    <rect x="-270" y="0" width="540" height="38" rx="10" class="box-header"/>
    <rect x="-270" y="26" width="540" height="12" class="box-header"/>
    <circle cx="-248" cy="19" r="8" class="dot-blue" opacity="0.6"/>
    <text x="0" y="27" text-anchor="middle" class="comic h-md">NETWORK SERVICES</text>
    <text x="248" y="26" text-anchor="end" class="mono" style="font-size: 10px; fill: currentColor; opacity: 0.3;">BRIDGES &amp; TUNNELS</text>

    <g class="mono" transform="translate(-248, 55)">
      <text x="0" y="0" class="svc-row">Firewalla</text>
      <text x="496" y="0" text-anchor="end" class="port">:1984</text>
      <text x="0" y="16" class="svc-desc">HTTP bridge · Firewalla Purple P2P · cloud auth required</text>

      <text x="0" y="38" class="svc-row">Signal Proxy</text>
      <text x="496" y="38" text-anchor="end" class="port">:5150</text>
      <text x="0" y="54" class="svc-desc">signal routing proxy</text>

      <text x="0" y="76" class="svc-row">Network Control</text>
      <text x="496" y="76" text-anchor="end" class="port">:4007</text>
      <text x="0" y="92" class="svc-desc">network control plane</text>

      <text x="0" y="114" class="svc-row">Ecobee</text>
      <text x="496" y="114" text-anchor="end" class="port">:42069</text>
      <text x="0" y="130" class="svc-desc">thermostat integration bridge</text>

      <text x="0" y="152" class="svc-row">Cloudflare Tunnel</text>
      <text x="496" y="152" text-anchor="end" class="port" style="font-size: 11px; opacity: 0.6;">Zero Trust</text>
      <text x="0" y="168" class="svc-desc">sanctum-hub · health.example.net · ha.example.net</text>
    </g>
  </g>

  <!-- ==================== SYSTEM SERVICES (MIDDLE RIGHT) ==================== -->
  <g transform="translate(890, 355)">
    <rect x="-270" y="0" width="540" height="240" rx="10" class="box"/>
    <rect x="-270" y="0" width="540" height="38" rx="10" class="box-header"/>
    <rect x="-270" y="26" width="540" height="12" class="box-header"/>
    <circle cx="-248" cy="19" r="8" class="dot-green" opacity="0.6"/>
    <text x="0" y="27" text-anchor="middle" class="comic h-md">SYSTEM SERVICES</text>
    <text x="248" y="26" text-anchor="end" class="mono" style="font-size: 10px; fill: currentColor; opacity: 0.3;">IMMUNE SYSTEM</text>

    <g class="mono" transform="translate(-248, 55)">
      <text x="0" y="0" class="svc-row">Watchdog</text>
      <text x="496" y="0" text-anchor="end" class="port" style="opacity: 0.5; font-size: 11px;">every 600s</text>
      <text x="0" y="16" class="svc-desc">health checks · auto-heal via service-doctor</text>

      <text x="0" y="38" class="svc-row">Secret Rotation</text>
      <text x="496" y="38" text-anchor="end" class="port" style="opacity: 0.5; font-size: 11px;">1st @ 3:30AM</text>
      <text x="0" y="54" class="svc-desc">monthly token rotation · Keychain updates</text>

      <text x="0" y="76" class="svc-row">UTM Autostart</text>
      <text x="496" y="76" text-anchor="end" class="port" style="opacity: 0.5; font-size: 11px;">on login</text>
      <text x="0" y="92" class="svc-desc">launches VM · sets bridge100 IP 10.10.10.1</text>

      <text x="0" y="114" class="svc-row">iCloud Filer</text>
      <text x="496" y="114" text-anchor="end" class="port" style="opacity: 0.5; font-size: 11px;">KeepAlive</text>
      <text x="0" y="130" class="svc-desc">auto-filing daemon · structured folders</text>

      <text x="0" y="152" class="svc-row">Kiwix</text>
      <text x="496" y="152" text-anchor="end" class="port">:8888</text>
      <text x="0" y="168" class="svc-desc">offline knowledge library · requires T9 drive</text>
    </g>
  </g>

  <!-- ==================== VM SERVICES (BOTTOM CENTER) ==================== -->
  <g transform="translate(600, 625)">
    <rect x="-370" y="0" width="740" height="230" rx="10" class="box-hero"/>
    <rect x="-370" y="0" width="740" height="38" rx="10" class="box-header"/>
    <rect x="-370" y="26" width="740" height="12" class="box-header"/>
    <circle cx="-348" cy="19" r="8" class="dot-orange" opacity="0.6"/>
    <text x="0" y="27" text-anchor="middle" class="comic h-md">VM SERVICES — UBUNTU 24.04</text>
    <text x="348" y="26" text-anchor="end" class="mono port" style="font-size: 10px; opacity: 0.5;">10.10.10.10 · AIR-GAPPED</text>

    <g class="mono" transform="translate(-348, 55)">
      <!-- Gateway -->
      <text x="0" y="0" class="svc-row">OpenClaw Gateway</text>
      <text x="696" y="0" text-anchor="end" class="port">:1977</text>
      <text x="0" y="16" class="svc-desc">1.5GB heap · 5 agents · systemd user unit</text>

      <text x="0" y="38" class="svc-row">Health Ingester</text>
      <text x="696" y="38" text-anchor="end" class="port">:10101</text>
      <text x="0" y="54" class="svc-desc">health data ingestion · exposed via Cloudflare</text>

      <line x1="0" y1="70" x2="696" y2="70" class="divider"/>

      <!-- Agent cluster inline -->
      <text x="0" y="90" class="section-head">AGENT CLUSTER</text>

      <circle cx="10" cy="116" r="6" class="dot-amber" opacity="0.7"/>
      <text x="26" y="120" class="svc-row" style="font-weight: 800;">Yoda</text>
      <text x="150" y="120" class="svc-desc">main agent</text>

      <circle cx="200" cy="116" r="6" class="dot-purple" opacity="0.7"/>
      <text x="216" y="120" class="svc-row" style="font-weight: 800;">Windu</text>
      <text x="340" y="120" class="svc-desc">security</text>

      <circle cx="420" cy="116" r="6" class="dot-green" opacity="0.7"/>
      <text x="436" y="120" class="svc-row" style="font-weight: 800;">Qui-Gon</text>
      <text x="570" y="120" class="svc-desc">efficiency</text>

      <circle cx="10" cy="146" r="6" class="dot-blue" opacity="0.7"/>
      <text x="26" y="150" class="svc-row" style="font-weight: 800;">Cilghal</text>
      <text x="150" y="150" class="svc-desc">health</text>

      <circle cx="200" cy="146" r="6" class="dot-orange" opacity="0.7"/>
      <text x="216" y="150" class="svc-row" style="font-weight: 800;">Mundi</text>
      <text x="340" y="150" class="svc-desc">finance</text>
    </g>
  </g>

  <!-- ==================== BOTTOM NOTE ==================== -->
  <g transform="translate(600, 885)">
    <line x1="-300" y1="-10" x2="300" y2="-10" class="divider"/>
    <text x="0" y="10" text-anchor="middle" class="mono" style="font-size: 12px; fill: currentColor; opacity: 0.4;">21 ports · 2 hosts · 1 closet</text>
    <text x="0" y="28" text-anchor="middle" class="mono" style="font-size: 10px; fill: currentColor; opacity: 0.3;">print this table · tape it to the wall · you will need it at 2 AM</text>
  </g>

  <!-- ==================== AMBIENT PARTICLES ==================== -->
  <g opacity="0.3">
    <circle cx="50" cy="300" r="1.5" class="dot-amber"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="500" r="1.5" class="dot-purple"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="620" r="1" class="dot-blue"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="100" cy="800" r="1" class="dot-green"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="150" r="1" class="dot-orange"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="3.8s" repeatCount="indefinite"/></circle>
  </g>
</svg>
