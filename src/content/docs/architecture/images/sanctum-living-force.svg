<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820" role="img" aria-label="The Living Force — before and after comparison showing evolution from flat watchdog to 6-phase self-healing system">
  <defs>
    <filter id="lf-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&amp;display=swap');

    .comic { font-family: 'Bangers', 'Impact', 'Arial Black', cursive; letter-spacing: 2px; }
    .mono { font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace; font-weight: 700; }

    .h-xl { font-size: 24px; fill: #d4952e; }
    .h-lg { font-size: 20px; fill: currentColor; }
    .h-md { font-size: 17px; fill: currentColor; }
    .label { font-size: 14px; fill: currentColor; opacity: 0.9; }
    .label-sm { font-size: 12px; fill: currentColor; opacity: 0.7; }
    .port { font-size: 13px; fill: #d4952e; font-weight: 800; }
    .subtitle { font-size: 12px; fill: currentColor; opacity: 0.5; font-weight: 600; }
    .section-head { font-size: 11px; fill: currentColor; opacity: 0.45; font-weight: 800; letter-spacing: 3px; }
    .phase-num { font-size: 22px; fill: #d4952e; font-weight: 900; }

    .box { fill: none; stroke: currentColor; stroke-width: 2; opacity: 0.3; }
    .box-hero { fill: none; stroke: #d4952e; stroke-width: 3; opacity: 0.7; }
    .box-header { fill: #d4952e; opacity: 0.1; }
    .box-dead { fill: none; stroke: #ff453a; stroke-width: 2; opacity: 0.35; }
    .line { stroke: currentColor; stroke-width: 1.5; opacity: 0.3; }
    .divider { stroke: currentColor; stroke-width: 1; opacity: 0.12; }

    .dot-amber { fill: #d4952e; }
    .dot-purple { fill: #bf5af2; }
    .dot-green { fill: #30d158; }
    .dot-blue { fill: #64d2ff; }
    .dot-orange { fill: #ff9f0a; }
    .dot-red { fill: #ff453a; }
  </style>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="820" fill="white"/>

  <!-- ==================== TITLE ==================== -->
  <text x="600" y="38" text-anchor="middle" class="comic h-xl">THE LIVING FORCE</text>
  <text x="600" y="58" text-anchor="middle" class="mono subtitle">March 22, 2026 — from blind watchdog to self-healing organism</text>

  <!-- ==================== BEFORE (LEFT) ==================== -->
  <g transform="translate(260, 90)">
    <rect x="-220" y="0" width="440" height="680" rx="10" class="box-dead"/>

    <!-- Header -->
    <rect x="-220" y="0" width="440" height="42" rx="10" fill="#ff453a" opacity="0.08"/>
    <rect x="-220" y="28" width="440" height="14" fill="#ff453a" opacity="0.08"/>
    <text x="0" y="30" text-anchor="middle" class="comic h-lg" style="fill: #ff453a; opacity: 0.7;">BEFORE — MARCH 22</text>

    <!-- "Flat Watchdog" label -->
    <text x="0" y="72" text-anchor="middle" class="comic" style="font-size: 16px; fill: currentColor; opacity: 0.5;">FLAT WATCHDOG</text>

    <!-- Pseudo-code block -->
    <g class="mono" transform="translate(-190, 100)">
      <text x="0" y="0" class="label" style="opacity: 0.6;">for each service:</text>
      <text x="24" y="28" class="label" style="opacity: 0.6;">check port</text>
      <text x="24" y="56" class="label" style="opacity: 0.6;">if down:</text>
      <text x="48" y="84" class="label" style="opacity: 0.6;">restart it</text>
      <text x="24" y="112" class="label" style="opacity: 0.6;">if still down:</text>
      <text x="48" y="140" class="label" style="opacity: 0.6;">send alert</text>
    </g>

    <!-- Divider -->
    <line x1="-190" y1="260" x2="190" y2="260" class="divider"/>

    <!-- Missing features -->
    <g class="mono" transform="translate(-190, 290)">
      <text x="0" y="0" class="section-head" style="fill: #ff453a; opacity: 0.5;">MISSING</text>

      <circle cx="10" cy="30" r="5" class="dot-red" opacity="0.5"/>
      <text x="26" y="34" class="label-sm" style="opacity: 0.5;">No dependency map</text>

      <circle cx="10" cy="56" r="5" class="dot-red" opacity="0.5"/>
      <text x="26" y="60" class="label-sm" style="opacity: 0.5;">No root cause analysis</text>

      <circle cx="10" cy="82" r="5" class="dot-red" opacity="0.5"/>
      <text x="26" y="86" class="label-sm" style="opacity: 0.5;">No quarantine</text>

      <circle cx="10" cy="108" r="5" class="dot-red" opacity="0.5"/>
      <text x="26" y="112" class="label-sm" style="opacity: 0.5;">No learning</text>

      <circle cx="10" cy="134" r="5" class="dot-red" opacity="0.5"/>
      <text x="26" y="138" class="label-sm" style="opacity: 0.5;">Checked wrong ports</text>

      <circle cx="10" cy="160" r="5" class="dot-red" opacity="0.5"/>
      <text x="26" y="164" class="label-sm" style="opacity: 0.5;">Missed crash loops</text>
    </g>

    <!-- The incident -->
    <g transform="translate(0, 530)">
      <line x1="-190" y1="0" x2="190" y2="0" class="divider"/>
      <text x="0" y="28" text-anchor="middle" class="comic" style="font-size: 13px; fill: #ff453a; opacity: 0.6;">28 SERVICES CASCADED</text>
      <text x="0" y="48" text-anchor="middle" class="mono" style="font-size: 11px; fill: currentColor; opacity: 0.35;">bridge100 didn't come up</text>
      <text x="0" y="64" text-anchor="middle" class="mono" style="font-size: 11px; fill: currentColor; opacity: 0.35;">watchdog reported "all clear"</text>
      <text x="0" y="80" text-anchor="middle" class="mono" style="font-size: 11px; fill: currentColor; opacity: 0.35;">human noticed at 4 AM</text>
    </g>
  </g>

  <!-- ==================== ARROW ==================== -->
  <g transform="translate(530, 420)">
    <line x1="0" y1="0" x2="100" y2="0" stroke="#d4952e" stroke-width="4" filter="url(#lf-glow)" opacity="0.7"/>
    <polygon points="100,-10 120,0 100,10" fill="#d4952e" opacity="0.7"/>
  </g>

  <!-- ==================== AFTER (RIGHT) ==================== -->
  <g transform="translate(900, 90)">
    <rect x="-240" y="0" width="480" height="680" rx="10" class="box-hero"/>

    <!-- Header -->
    <rect x="-240" y="0" width="480" height="42" rx="10" class="box-header"/>
    <rect x="-240" y="28" width="480" height="14" class="box-header"/>
    <text x="0" y="30" text-anchor="middle" class="comic h-lg" style="fill: #d4952e;">AFTER — THE LIVING FORCE</text>

    <!-- Phase 6 (top of stack) -->
    <g transform="translate(0, 60)">
      <rect x="-220" y="0" width="440" height="80" rx="6" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
      <rect x="-220" y="0" width="440" height="28" rx="6" fill="#d4952e" opacity="0.06"/>
      <text x="-198" y="20" class="phase-num">6</text>
      <text x="-170" y="20" class="comic h-md" style="font-size: 15px;">CONTINUOUS EVOLUTION</text>
      <text x="-198" y="46" class="mono label-sm" style="opacity: 0.5;">incident learning</text>
      <text x="-198" y="64" class="mono label-sm" style="opacity: 0.5;">performance reviews · evolution reports</text>
      <circle cx="200" cy="50" r="7" class="dot-amber" opacity="0.4"/>
    </g>

    <!-- Phase 5 -->
    <g transform="translate(0, 152)">
      <rect x="-220" y="0" width="440" height="80" rx="6" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
      <rect x="-220" y="0" width="440" height="28" rx="6" fill="#d4952e" opacity="0.06"/>
      <text x="-198" y="20" class="phase-num">5</text>
      <text x="-170" y="20" class="comic h-md" style="font-size: 15px;">BATTLE TESTING</text>
      <text x="-198" y="46" class="mono label-sm" style="opacity: 0.5;">chaos-forge · scheduled fire drills</text>
      <text x="-198" y="64" class="mono label-sm" style="opacity: 0.5;">kill services · sever bridges · corrupt configs</text>
      <circle cx="200" cy="50" r="7" class="dot-red" opacity="0.4"/>
    </g>

    <!-- Phase 4 -->
    <g transform="translate(0, 244)">
      <rect x="-220" y="0" width="440" height="80" rx="6" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
      <rect x="-220" y="0" width="440" height="28" rx="6" fill="#d4952e" opacity="0.06"/>
      <text x="-198" y="20" class="phase-num">4</text>
      <text x="-170" y="20" class="comic h-md" style="font-size: 15px;">TECH LOOKOUT</text>
      <text x="-198" y="46" class="mono label-sm" style="opacity: 0.5;">CVE scanning · dependency updates</text>
      <text x="-198" y="64" class="mono label-sm" style="opacity: 0.5;">knowledge frontier shifts · daily cadence</text>
      <circle cx="200" cy="50" r="7" class="dot-blue" opacity="0.4"/>
    </g>

    <!-- Phase 3 -->
    <g transform="translate(0, 336)">
      <rect x="-220" y="0" width="440" height="80" rx="6" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
      <rect x="-220" y="0" width="440" height="28" rx="6" fill="#d4952e" opacity="0.06"/>
      <text x="-198" y="20" class="phase-num">3</text>
      <text x="-170" y="20" class="comic h-md" style="font-size: 15px;">AGENT AUTONOMY</text>
      <text x="-198" y="46" class="mono label-sm" style="opacity: 0.5;">code-forge · staging pipeline · audit log</text>
      <text x="-198" y="64" class="mono label-sm" style="opacity: 0.5;">night deployments · midnight to 6 AM</text>
      <circle cx="200" cy="50" r="7" class="dot-purple" opacity="0.4"/>
    </g>

    <!-- Phase 2 -->
    <g transform="translate(0, 428)">
      <rect x="-220" y="0" width="440" height="80" rx="6" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
      <rect x="-220" y="0" width="440" height="28" rx="6" fill="#d4952e" opacity="0.06"/>
      <text x="-198" y="20" class="phase-num">2</text>
      <text x="-170" y="20" class="comic h-md" style="font-size: 15px;">IMMUNE SYSTEM</text>
      <text x="-198" y="46" class="mono label-sm" style="opacity: 0.5;">metrics · anomaly detection · remediation ladder</text>
      <text x="-198" y="64" class="mono label-sm" style="opacity: 0.5;">quarantine crash loops · 3 failures in 5 min = isolate</text>
      <circle cx="200" cy="50" r="7" class="dot-green" opacity="0.4"/>
    </g>

    <!-- Phase 1 (foundation) -->
    <g transform="translate(0, 520)">
      <rect x="-220" y="0" width="440" height="90" rx="6" fill="none" stroke="#d4952e" stroke-width="2" opacity="0.5"/>
      <rect x="-220" y="0" width="440" height="28" rx="6" fill="#d4952e" opacity="0.1"/>
      <text x="-198" y="20" class="phase-num">1</text>
      <text x="-170" y="20" class="comic h-md" style="font-size: 15px;">SERVICE GRAPH</text>
      <text x="220" y="20" text-anchor="end" class="mono port" style="font-size: 10px; opacity: 0.6;">FOUNDATION</text>
      <text x="-198" y="46" class="mono label-sm" style="opacity: 0.5;">28 YAML manifests · dependency DAG</text>
      <text x="-198" y="64" class="mono label-sm" style="opacity: 0.5;">root-cause analysis · topological sort</text>
      <text x="-198" y="80" class="mono label-sm" style="opacity: 0.5;">never restart if upstream is down</text>
      <circle cx="200" cy="58" r="7" class="dot-orange" opacity="0.4"/>
    </g>

    <!-- Badge -->
    <g transform="translate(0, 640)">
      <rect x="-60" y="-5" width="120" height="24" rx="12" fill="#d4952e" opacity="0.12" stroke="#d4952e" stroke-width="1" stroke-opacity="0.35"/>
      <text x="0" y="12" text-anchor="middle" class="comic" style="font-size: 13px; fill: #d4952e; opacity: 0.8;">6 PHASES</text>
    </g>
  </g>

  <!-- ==================== BOTTOM PRINCIPLES ==================== -->
  <g transform="translate(600, 798)">
    <text x="0" y="0" text-anchor="middle" class="mono" style="font-size: 11px; fill: currentColor; opacity: 0.35;">10 principles · council before code · no quick fixes · Rust for long-running · honest health</text>
  </g>

  <!-- ==================== AMBIENT PARTICLES ==================== -->
  <g opacity="0.3">
    <circle cx="50" cy="300" r="1.5" class="dot-red"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="530" cy="200" r="1.5" class="dot-amber"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="1160" cy="700" r="1" class="dot-green"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="530" cy="600" r="1" class="dot-purple"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="4.5s" repeatCount="indefinite"/></circle>
  </g>
</svg>